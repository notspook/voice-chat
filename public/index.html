<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ripple</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="auth-screen">
    <div class="auth-box">
      <h1>Ripple</h1>
      <p class="auth-sub">Talk. Text. Together.</p>
      <div id="auth-tabs">
        <button class="auth-tab active" data-tab="login">Login</button>
        <button class="auth-tab" data-tab="register">Register</button>
      </div>
      <form id="auth-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="auth-username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="auth-password" autocomplete="current-password" required>
        </div>
        <div id="auth-error" class="auth-error"></div>
        <button type="submit" id="auth-btn">Login</button>
      </form>
    </div>
  </div>

  <div id="app" style="display:none">
    <div id="sidebar">
      <div id="user-section">
        <div id="user-avatar"></div>
        <div id="user-info">
          <span id="user-name"></span>
          <span id="user-status">Online</span>
        </div>
        <button id="logout-btn" title="Logout">✕</button>
      </div>
      <div id="channel-list">
        <div class="channel-group">
          <div class="channel-group-header">Voice Channels</div>
          <div id="voice-channels"></div>
        </div>
        <div class="channel-group">
          <div class="channel-group-header">Text Channels</div>
          <div id="text-channels"></div>
        </div>
      </div>
    </div>

    <div id="main">
      <div id="voice-view" style="display:none">
        <div id="voice-header">
          <span id="voice-channel-name"></span>
          <span id="voice-users-count"></span>
        </div>
        <div id="voice-users-list">
          <div id="voice-peer-grid"></div>
          <div id="voice-status">
            <div id="connection-indicator"></div>
            <span id="connection-status-text">Connected</span>
          </div>
        </div>
        <div id="voice-controls">
          <div id="vc-left">
            <button id="mute-btn" class="vc-btn" title="Toggle Mute">
              <span class="vc-icon">🎤</span>
              <span class="vc-label">Mute</span>
            </button>
            <button id="deafen-btn" class="vc-btn" title="Toggle Deafen">
              <span class="vc-icon">🔇</span>
              <span class="vc-label">Deafen</span>
            </button>
          </div>
          <div id="vc-center">
            <button id="screen-share-btn" class="vc-btn" title="Share Screen">
              <span class="vc-icon">🖥️</span>
              <span class="vc-label">Share</span>
            </button>
            <button id="ptt-btn" class="vc-btn active-soft" title="Push to Talk (Hold Space)">
              <span class="vc-icon">🎙️</span>
              <span class="vc-label">PTT</span>
            </button>
          </div>
          <div id="vc-right">
            <div class="device-group" title="Microphone">
              <label>Mic</label>
              <select id="mic-select"></select>
            </div>
            <div class="device-group" title="Speaker">
              <label>Spk</label>
              <select id="speaker-select"></select>
            </div>
          </div>
        </div>
      </div>

      <div id="local-screen-preview" style="display:none">
        <video id="local-screen-video" autoplay playsinline muted></video>
        <button id="stop-screen-btn">Stop</button>
      </div>

      <div id="chat-view" style="display:none">
        <div id="chat-header">
          <span id="chat-channel-name"></span>
        </div>
        <div id="chat-messages"></div>
        <div id="chat-typing"></div>
        <div id="chat-input-area">
          <textarea id="chat-input" placeholder="Message..." rows="1"></textarea>
          <button id="chat-send-btn">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
