<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="join-screen">
    <h1>Voice Chat</h1>
    <div class="form-group">
      <label>Display Name</label>
      <input type="text" id="display-name" placeholder="Enter your name" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Room Name</label>
      <input type="text" id="room-name" placeholder="Room name" autocomplete="off">
    </div>
    <button id="join-btn">Join Room</button>
  </div>

  <div id="room-screen" style="display:none">
    <div id="top-bar">
      <span id="room-label"></span>
      <button id="leave-btn">Leave</button>
    </div>
    <div id="peer-grid"></div>
    <div id="controls">
      <div id="device-selects">
        <div class="device-group">
          <label>Microphone</label>
          <select id="mic-select"></select>
        </div>
        <div class="device-group">
          <label>Speaker</label>
          <select id="speaker-select"></select>
        </div>
      </div>
      <div id="control-buttons">
        <button id="mute-btn" class="control-btn active">Mute</button>
        <button id="screen-share-btn" class="control-btn">Share Screen</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
