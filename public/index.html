  const av = makeAvatar(username, color, 'avatar');
  av.style.width='30px'; av.style.height='30px'; av.style.fontSize='12px';
  const status = userStatuses[username] || 'online';
  const dot = el('span','status-dot '+(status==='online'?'':status));
  av.appendChild(dot);
  row.appendChild(av);
  const col = el('div');
  const nm = el('span','mr-name', username);
  applyNameStyle(nm, username);
  col.appendChild(nm);
  if(sub) col.appendChild(el('span','mr-sub', sub));
  row.appendChild(col);
  row.addEventListener('click', (e)=>{ e.stopPropagation(); openProfilePopout(row, username, color); });
  return row;
}
$('members-toggle').addEventListener('click', ()=>{
  $('members').style.display = $('members').style.display==='none' ? '' : 'none';
});

/* ============================================================
   Settings modal
   ============================================================ */
$('up-settings').addEventListener('click', openSettings);
let settingsOverlay = null;

function openSettings(){
  closeSettings();
  const ov = el('div','overlay');
  const modal = el('div','modal'); modal.id = 'settings-modal';
  const nav = el('div'); nav.id = 'settings-nav';
  const body = el('div'); body.id = 'settings-body';
  modal.append(nav, body);
  ov.appendChild(modal);
  document.body.appendChild(ov);
  settingsOverlay = ov;
  ov.addEventListener('click', (e)=>{ if(e.target===ov) closeSettings(); });

  nav.appendChild(el('h5', null, 'Settings'));
  const panes = [
    ['profile','My profile', paneProfile],
    ['voice','Voice & audio', paneVoice],
    ['appearance','Appearance', paneAppearance],
    ['keybinds','Keybinds', paneKeybinds]
  ];
  let items = [];
  panes.forEach(([id, label, build])=>{
    const b = el('button','snav-item', label);
    b.addEventListener('click', ()=>{ items.forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderPane(build); });
    items.push(b); nav.appendChild(b);
  });
  const lo = el('button','snav-item danger','Log out');
  lo.addEventListener('click', logout);
  nav.appendChild(lo);

  function renderPane(build){
    body.innerHTML = '';
    const close = el('button','icon-btn'); close.id='settings-close'; close.appendChild(svgUse('i-x'));
    close.addEventListener('click', closeSettings);
    body.appendChild(close);
    body.appendChild(build());
  }
  items[0].classList.add('active');
  renderPane(paneProfile);
}
function closeSettings(){ if(settingsOverlay){ settingsOverlay.remove(); settingsOverlay = null; } }

function mkToggle(get, set){
  const t = el('button','toggle'+(get()?' on':''));
  t.addEventListener('click', ()=>{ set(!get()); t.classList.toggle('on', get()); });
  return t;
}
function mkRow(label, small, control){
  const row = el('div','srow');
  const l = el('div','sl', label);
  if(small) l.appendChild(el('small', null, small));
  row.append(l, control);
  return row;
}

function paneProfile(){
  const pane = el('div','spane');
  pane.appendChild(el('h3', null, 'My profile'));

  const preview = el('div'); preview.style.marginBottom = '22px';
  const renderPreview = ()=>{ preview.innerHTML=''; preview.appendChild(buildProfileCard(currentUser.username, currentUser.avatar_color)); };

  const saveProfile = ()=>{
    myProfile = sanitizeProfile(myProfile);
    store.set('profile', myProfile);
    profiles[currentUser.username] = myProfile;
    broadcastMeta({ t:'profile', profile: myProfile, username: currentUser.username });
    renderUserPanel();
    const t = tileFor('local');
    if(t){ receiveProfileSelfRefresh(); }
    renderMembers();
    renderPreview();
  };
  function receiveProfileSelfRefresh(){
    const t = tileFor('local'); if(!t) return;
    const av = t.querySelector('.av-wrap .avatar');
    const fresh = makeAvatar(currentUser.username, currentUser.avatar_color, 'avatar');
    fresh.style.width='72px'; fresh.style.height='72px'; fresh.style.fontSize='24px';
    av.replaceWith(fresh);
    applyNameStyle(t.querySelector('.vt-name'), currentUser.username);
  }

  renderPreview();
  pane.appendChild(preview);

  // avatar image
  const avField = el('div','sfield');
  avField.appendChild(el('label', null, 'Avatar image'));
  const avRow = el('div'); avRow.style.display='flex'; avRow.style.gap='8px';
  const upBtn = el('button','btn','Upload image (or GIF)');
  upBtn.addEventListener('click', ()=>$('avatar-file').click());
  const clearBtn = el('button','btn ghost','Remove');
  clearBtn.addEventListener('click', ()=>{ myProfile.avatar=''; saveProfile(); });
  avRow.append(upBtn, clearBtn);
  avField.appendChild(avRow);
  avField.appendChild(el('div','desc','Shown to people in voice channels with you. Animated GIFs stay animated. Kept small so it travels peer-to-peer.'));
  pane.appendChild(avField);
  $('avatar-file').onchange = async ()=>{
    const f = $('avatar-file').files[0];
    $('avatar-file').value='';
    if(!f) return;
    try{
      let dataUrl;
      if(f.type==='image/gif' && f.size < 50000){
        dataUrl = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(f); });
      }else{
        dataUrl = await compressImage(f, 60000);
      }
      if(dataUrl.length > 69000){ toast('That image is too large even after compression — try a smaller one (GIFs must be under ~35 KB).','err'); return; }
      myProfile.avatar = dataUrl; saveProfile();
    }catch{ toast('Could not read that image.','err'); }
  };

  // banner color
  const bField = el('div','sfield');
  bField.appendChild(el('label', null, 'Banner color'));
  const swr = el('div','swatch-row');
  ['#17B8A6','#3B82F6','#8B5CF6','#EC4899','#F97316','#EAB308','#22C55E','#64748B','#0F172A'].forEach(c=>{
    const s = el('button','swatch'+(myProfile.banner===c?' sel':''));
    s.style.background = c;
    s.addEventListener('click', ()=>{ myProfile.banner = c; saveProfile(); swr.querySelectorAll('.swatch').forEach(x=>x.classList.remove('sel')); s.classList.add('sel'); });
    swr.appendChild(s);
  });
  bField.appendChild(swr);
  pane.appendChild(bField);

  // name color + font
  const nField = el('div','sfield');
  nField.appendChild(el('label', null, 'Name color'));
  const nwr = el('div','swatch-row');
  ['','#3FE0C5','#79C0FF','#D2A8FF','#FF7B72','#FFA657','#7EE787','#F778BA'].forEach(c=>{
    const s = el('button','swatch'+((myProfile.nameColor||'')===c?' sel':''));
    s.style.background = c || 'linear-gradient(135deg,var(--text) 50%,var(--bg-4) 50%)';
    s.title = c || 'Default';
    s.addEventListener('click', ()=>{ myProfile.nameColor = c; saveProfile(); nwr.querySelectorAll('.swatch').forEach(x=>x.classList.remove('sel')); s.classList.add('sel'); });
    nwr.appendChild(s);
  });
  nField.appendChild(nwr);
  pane.appendChild(nField);

  const fField = el('div','sfield');
  fField.appendChild(el('label', null, 'Name font'));
  const fSel = el('select');
  [['','Default'],['display','Display'],['serif','Serif'],['mono','Monospace'],['cursive','Handwritten']].forEach(([v,l])=>{
    const o = el('option', null, l); o.value = v; if((myProfile.nameFont||'')===v) o.selected = true; fSel.appendChild(o);
  });
  fSel.addEventListener('change', ()=>{ myProfile.nameFont = fSel.value; saveProfile(); });
  fField.appendChild(fSel);
  pane.appendChild(fField);

  // about
  const aField = el('div','sfield');
  aField.appendChild(el('label', null, 'About me'));
  const ta = el('textarea'); ta.maxLength = 300; ta.value = myProfile.about || '';
  ta.addEventListener('change', ()=>{ myProfile.about = ta.value; saveProfile(); });
  aField.appendChild(ta);
  aField.appendChild(el('div','desc','Shown on your profile card. Profile details are shared live with people in voice with you; they are stored on this device.'));
  pane.appendChild(aField);
  return pane;
}

function paneVoice(){
  const pane = el('div','spane');
  pane.appendChild(el('h3', null, 'Voice & audio'));

  const micF = el('div','sfield');
  micF.appendChild(el('label', null, 'Input device'));
  const micSel = el('select'); micSel.id = 's-mic';
  micSel.addEventListener('change', ()=>onMicChosen(micSel.value));
  micF.appendChild(micSel);
  pane.appendChild(micF);

  const spkF = el('div','sfield');
  spkF.appendChild(el('label', null, 'Output device'));
  const spkSel = el('select'); spkSel.id = 's-speaker';
  spkSel.addEventListener('change', ()=>onSpeakerChosen(spkSel.value));
  spkF.appendChild(spkSel);
  pane.appendChild(spkF);

  // live input meter
  const mF = el('div','sfield');
  mF.appendChild(el('label', null, 'Input level'));
  const meter = el('div','meter'); const bar = el('i'); meter.appendChild(bar);
  mF.appendChild(meter);
  mF.appendChild(el('div','desc', micStream ? 'Speak to test your microphone.' : 'Join a voice channel (or grant mic access) to see your level.'));
  pane.appendChild(mF);
  const meterTimer = setInterval(()=>{
    if(!document.body.contains(meter)){ clearInterval(meterTimer); return; }
    if(!localAnalyser){ bar.style.width='0%'; return; }
    const buf = new Uint8Array(128);
    localAnalyser.getByteFrequencyData(buf);
    bar.style.width = clamp((buf.reduce((a,b)=>a+b,0)/buf.length)*1.8, 0, 100) + '%';
  }, 90);

  const reacquire = async ()=>{ if(micStream){ await swapMic(); } };
  pane.appendChild(mkRow('Noise suppression','Filters background noise from your mic', mkToggle(()=>settings.noiseSuppression, v=>{ settings.noiseSuppression=v; store.set('settings',settings); reacquire(); })));
  pane.appendChild(mkRow('Echo cancellation','Prevents your speakers from feeding back', mkToggle(()=>settings.echoCancellation, v=>{ settings.echoCancellation=v; store.set('settings',settings); reacquire(); })));
  pane.appendChild(mkRow('Automatic gain','Keeps your volume level steady', mkToggle(()=>settings.autoGainControl, v=>{ settings.autoGainControl=v; store.set('settings',settings); reacquire(); })));
  pane.appendChild(mkRow('Share system audio','Include audio when sharing your screen (where the browser supports it)', mkToggle(()=>settings.shareAudio, v=>{ settings.shareAudio=v; store.set('settings',settings); })));
  pane.appendChild(mkRow('Join & leave sounds','Play a soft chime when people come and go', mkToggle(()=>settings.joinSounds, v=>{ settings.joinSounds=v; store.set('settings',settings); })));

  refreshDevices();
  return pane;
}

function paneAppearance(){
  const pane = el('div','spane');
  pane.appendChild(el('h3', null, 'Appearance'));

  const tF = el('div','sfield');
  tF.appendChild(el('label', null, 'Theme'));
  const cards = el('div','theme-cards');
  [['deep','Deep','#101826'],['midnight','Midnight','#0A0D12'],['light','Light','#F6F8FB']].forEach(([id,name,bg])=>{
    const c = el('div','theme-card'+(settings.theme===id?' sel':''));
    const prev = el('div','tc-prev'); prev.style.background = `linear-gradient(135deg, ${bg}, hsl(${settings.accentHue} 70% 52% / .35))`;
    c.append(prev, el('div','tc-name', name));
    c.addEventListener('click', ()=>{ settings.theme=id; applySettings(); cards.querySelectorAll('.theme-card').forEach(x=>x.classList.remove('sel')); c.classList.add('sel'); });
    cards.appendChild(c);
  });
  tF.appendChild(cards);
  pane.appendChild(tF);

  const aF = el('div','sfield');
  aF.appendChild(el('label', null, 'Accent color'));
  const hue = el('input'); hue.type='range'; hue.min=0; hue.max=359; hue.value=settings.accentHue;
  hue.addEventListener('input', ()=>{ settings.accentHue = +hue.value; applySettings(); });
  aF.appendChild(hue);
  aF.appendChild(el('div','desc','Recolors the whole app — the ripple stays yours.'));
  pane.appendChild(aF);

  const fF = el('div','sfield');
  fF.appendChild(el('label', null, 'Text size'));
  const fs = el('input'); fs.type='range'; fs.min=13; fs.max=18; fs.value=settings.fontSize;
  fs.addEventListener('input', ()=>{ settings.fontSize = +fs.value; applySettings(); });
  fF.appendChild(fs);
  pane.appendChild(fF);

  pane.appendChild(mkRow('Compact messages','Tighter spacing in chat', mkToggle(()=>settings.compact, v=>{ settings.compact=v; applySettings(); })));
  pane.appendChild(mkRow('24-hour time','Use 24-hour timestamps', mkToggle(()=>settings.time24, v=>{ settings.time24=v; store.set('settings',settings); })));
  pane.appendChild(mkRow('Reduce motion','Minimize animations and ripples', mkToggle(()=>settings.reduceMotion, v=>{ settings.reduceMotion=v; applySettings(); })));
  return pane;
}

function paneKeybinds(){
  const pane = el('div','spane');
  pane.appendChild(el('h3', null, 'Keybinds'));
  const table = el('table','kbd-table');
  [['Quick channel switcher','Ctrl + K'],
   ['Toggle mute','Ctrl + Shift + M'],
   ['Toggle deafen','Ctrl + Shift + D'],
   ['Push to talk (when enabled)','Hold Space'],
   ['Send message','Enter'],
   ['New line in message','Shift + Enter'],
   ['Close menus & dialogs','Esc']].forEach(([what,keys])=>{
    const tr = el('tr');
    tr.appendChild(el('td', null, what));
    const td = el('td');
    keys.split(' + ').forEach((k,i,arr)=>{ td.appendChild(el('kbd', null, k)); if(i<arr.length-1) td.appendChild(document.createTextNode(' + ')); });
    tr.appendChild(td);
    table.appendChild(tr);
  });
  pane.appendChild(table);
  return pane;
}

/* ============================================================
   Quick switcher (Ctrl+K)
   ============================================================ */
let qsOverlay = null, qsSel = 0;
$('qs-hint-btn').addEventListener('click', openQuickSwitcher);
function openQuickSwitcher(){
  if(qsOverlay){ closeQuickSwitcher(); return; }
  const ov = el('div','overlay'); ov.style.alignItems = 'flex-start';
  const modal = el('div','modal'); modal.id = 'qs-modal';
  const input = el('input'); input.id = 'qs-input'; input.placeholder = 'Jump to a channel…';
  const results = el('div'); results.id = 'qs-results';
  const hint = el('div','qs-hint');
  hint.innerHTML = '<span>↑↓ navigate</span><span>Enter open</span><span>Esc close</span>';
  modal.append(input, results, hint);
  ov.appendChild(modal);
  document.body.appendChild(ov);
  qsOverlay = ov; qsSel = 0;
  ov.addEventListener('click', (e)=>{ if(e.target===ov) closeQuickSwitcher(); });

  const render = ()=>{
    const q = input.value.trim().toLowerCase();
    const list = channels.filter(c=>!q || c.name.toLowerCase().includes(q));
    qsSel = clamp(qsSel, 0, Math.max(0, list.length-1));
    results.innerHTML = '';
    list.forEach((c,i)=>{
      const item = el('div','qs-item'+(i===qsSel?' sel':''));
      const ic = el('span','ch-icon'); ic.appendChild(svgUse(c.type==='voice'?'i-speaker':'i-hash'));
      item.append(ic, el('span', null, c.name));
      item.addEventListener('click', ()=>{ closeQuickSwitcher(); openChannel(c); });
      item.addEventListener('mousemove', ()=>{ qsSel=i; render(); });
      results.appendChild(item);
    });
    results._list = list;
  };
  input.addEventListener('input', ()=>{ qsSel=0; render(); });
  input.addEventListener('keydown', (e)=>{
    const list = results._list || [];
    if(e.key==='ArrowDown'){ e.preventDefault(); qsSel=clamp(qsSel+1,0,list.length-1); render(); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); qsSel=clamp(qsSel-1,0,list.length-1); render(); }
    else if(e.key==='Enter'){ e.preventDefault(); if(list[qsSel]){ closeQuickSwitcher(); openChannel(list[qsSel]); } }
  });
  render();
  setTimeout(()=>input.focus(), 20);
}
function closeQuickSwitcher(){ if(qsOverlay){ qsOverlay.remove(); qsOverlay=null; } }

/* ============================================================
   Global keybinds
   ============================================================ */
document.addEventListener('keydown', (e)=>{
  if((e.ctrlKey||e.metaKey) && !e.shiftKey && e.key.toLowerCase()==='k'){ e.preventDefault(); openQuickSwitcher(); return; }
  if((e.ctrlKey||e.metaKey) && e.shiftKey && e.key.toLowerCase()==='m'){ e.preventDefault(); toggleMute(); return; }
  if((e.ctrlKey||e.metaKey) && e.shiftKey && e.key.toLowerCase()==='d'){ e.preventDefault(); toggleDeafen(); return; }
  if(e.key==='Escape'){
    closeQuickSwitcher(); closeSettings(); closePopovers(); closeProfilePopout(); closeStatusMenu();
    const lb = $('lightbox'); if(lb) lb.remove();
  }
});

/* keep AudioContext alive after the first user gesture (autoplay policy) */
document.addEventListener('pointerdown', ()=>{ if(audioCtx && audioCtx.state==='suspended') audioCtx.resume().catch(()=>{}); }, { passive:true });

   START
   ============================================================ */
(async ()=>{
  if(await checkExistingSession()){
    enterApp();
  }
  // otherwise the auth screen stays visible
})();
