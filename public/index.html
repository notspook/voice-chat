<!DOCTYPE html>
<html lang="en" data-theme="deep">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ripple</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<style>
/* ============================================================
   RIPPLE â€” design tokens
   ============================================================ */
:root{
  --accent-h:168;
  --accent:hsl(var(--accent-h) 70% 52%);
  --accent-strong:hsl(var(--accent-h) 82% 62%);
  --accent-soft:hsl(var(--accent-h) 70% 52% / .13);
  --accent-glow:hsl(var(--accent-h) 80% 55% / .35);
  --bg-0:#060A10; --bg-1:#0B111A; --bg-2:#101826; --bg-3:#16202F; --bg-4:#1C2838;
  --border:#1E2A3B; --border-soft:#16202E;
  --text:#E7EEF6; --text-dim:#94A5B9; --text-faint:#5D6E82;
  --danger:#F4645F; --danger-soft:rgba(244,100,95,.14);
  --warn:#E8B44F; --ok:#3DDC97; --idle:#E8B44F; --dnd:#F4645F; --offline:#5D6E82;
  --radius:10px; --radius-lg:14px;
  --font-body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --font-display:'Sora',var(--font-body);
  --fs:15px;
  --shadow-pop:0 12px 40px rgba(0,0,0,.55), 0 2px 8px rgba(0,0,0,.4);
}
html[data-theme="midnight"]{
  --bg-0:#000000; --bg-1:#050608; --bg-2:#0A0D12; --bg-3:#10141B; --bg-4:#161B24;
  --border:#1B212B; --border-soft:#12161D;
}
html[data-theme="light"]{
  --bg-0:#E4E9F0; --bg-1:#EDF1F6; --bg-2:#F6F8FB; --bg-3:#FFFFFF; --bg-4:#E9EEF4;
  --border:#D4DCE6; --border-soft:#E2E8F0;
  --text:#1A2432; --text-dim:#55657A; --text-faint:#8B99AB;
  --accent-soft:hsl(var(--accent-h) 70% 42% / .12);
  --shadow-pop:0 12px 40px rgba(20,35,60,.18), 0 2px 8px rgba(20,35,60,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:var(--font-body); font-size:var(--fs); color:var(--text);
  background:var(--bg-0); overflow:hidden;
}
button{cursor:pointer;border:none;font-family:inherit;color:inherit;background:none;font-size:inherit}
input,textarea,select{font-family:inherit;outline:none;color:var(--text)}
img{max-width:100%}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg-4);border-radius:4px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:var(--border);background-clip:content-box}
.hidden{display:none !important}
@media (prefers-reduced-motion:reduce){ *,*::before,*::after{animation-duration:.001s !important;transition-duration:.001s !important} }
html.reduce-motion *,html.reduce-motion *::before,html.reduce-motion *::after{animation-duration:.001s !important;transition-duration:.001s !important}

/* ============================================================
   AUTH â€” sonar ripple hero
   ============================================================ */
#auth-screen{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(1200px 800px at 30% 20%, var(--bg-2), var(--bg-0) 70%);
  z-index:50;
}
.sonar{position:absolute;left:50%;top:50%;border-radius:50%;border:1px solid hsl(var(--accent-h) 70% 52% / .18);
  transform:translate(-50%,-50%) scale(.2);animation:sonar 7s linear infinite;pointer-events:none}
.sonar:nth-child(1){width:44vmax;height:44vmax}
.sonar:nth-child(2){width:44vmax;height:44vmax;animation-delay:1.75s}
.sonar:nth-child(3){width:44vmax;height:44vmax;animation-delay:3.5s}
.sonar:nth-child(4){width:44vmax;height:44vmax;animation-delay:5.25s}
@keyframes sonar{0%{transform:translate(-50%,-50%) scale(.15);opacity:0}12%{opacity:.9}100%{transform:translate(-50%,-50%) scale(1.6);opacity:0}}
.auth-card{
  position:relative;width:400px;max-width:calc(100vw - 32px);padding:40px 36px;
  background:color-mix(in srgb, var(--bg-2) 88%, transparent);
  border:1px solid var(--border);border-radius:20px;backdrop-filter:blur(14px);
  box-shadow:var(--shadow-pop);
}
.brand-mark{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:6px}
.brand-mark svg{width:34px;height:34px}
.brand-mark h1{font-family:var(--font-display);font-size:30px;font-weight:800;letter-spacing:-.5px}
.auth-sub{color:var(--text-dim);font-size:14px;text-align:center;margin-bottom:26px}
.auth-tabs{display:flex;background:var(--bg-1);border-radius:10px;padding:4px;margin-bottom:22px;border:1px solid var(--border-soft)}
.auth-tab{flex:1;padding:9px;border-radius:7px;font-size:14px;font-weight:600;color:var(--text-dim);transition:all .18s}
.auth-tab.active{background:var(--accent);color:#04211C}
.auth-tab:hover:not(.active){color:var(--text)}
.form-group{margin-bottom:15px}
.form-group label{display:block;font-size:11px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px}
.form-group input{width:100%;padding:11px 13px;background:var(--bg-1);border:1px solid var(--border);border-radius:9px;font-size:14px;transition:border-color .15s, box-shadow .15s}
.form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.auth-error{color:var(--danger);font-size:13px;min-height:19px;margin-bottom:10px}
#auth-btn{width:100%;padding:12px;background:var(--accent);color:#04211C;border-radius:10px;font-size:15px;font-weight:700;transition:filter .15s, transform .1s}
#auth-btn:hover{filter:brightness(1.1)}
#auth-btn:active{transform:translateY(1px)}
#auth-btn:disabled{opacity:.6;cursor:default}

/* ============================================================
   APP SHELL
   ============================================================ */
#app{display:flex;flex-direction:column;height:100vh}
#conn-banner{display:none;align-items:center;justify-content:center;gap:8px;background:var(--warn);color:#241A02;font-size:13px;font-weight:600;padding:5px}
#conn-banner.show{display:flex}
#shell{flex:1;display:flex;min-height:0}


/* -------- Server rail -------- */
#rail{width:68px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px 0;background:var(--bg-0);border-right:1px solid var(--border-soft);overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
#rail::-webkit-scrollbar{display:none}
.rail-item{position:relative;width:44px;height:44px;border-radius:50%;background:var(--bg-2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--text-dim);transition:border-radius .18s,background .18s,color .18s;flex-shrink:0;user-select:none}
.rail-item:hover{border-radius:16px;background:var(--bg-3);color:var(--text)}
.rail-item.active{border-radius:16px;background:var(--accent-soft);color:var(--accent-strong)}
.rail-item.active::before{content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:4px;height:26px;border-radius:0 4px 4px 0;background:var(--accent)}
.rail-item.has-unread::after{content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:4px;height:8px;border-radius:0 4px 4px 0;background:var(--text)}
.rail-item.active.has-unread::after{display:none}
.rail-item svg{width:22px;height:22px}
.rail-item.add{color:var(--ok);background:var(--bg-1);border:1px dashed var(--border)}
.rail-item.add:hover{background:var(--ok);color:#06251A;border-color:transparent}
.rail-sep{width:26px;height:2px;border-radius:2px;background:var(--border);flex-shrink:0}
/* -------- DM list -------- */
.dm-row{display:flex;align-items:center;gap:9px;padding:5px 8px;min-height:38px;border-radius:6px;cursor:pointer;color:var(--text-dim);transition:background .13s}
.dm-row:hover{background:var(--bg-2);color:var(--text)}
.dm-row.active{background:var(--accent-soft);color:var(--text)}
.dm-row .avatar{width:30px;height:30px;font-size:11px;position:relative;flex-shrink:0}
.dm-row .dm-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px;font-weight:500}
.dm-row .ch-unread{width:8px;height:8px;border-radius:50%;background:var(--text)}
#home-hint{font-size:12.5px;color:var(--text-faint);padding:10px 8px;line-height:1.5}
.side-action{display:flex;align-items:center;gap:8px;width:100%;padding:6px 8px;border-radius:6px;font-size:13.5px;font-weight:600;color:var(--text-dim);transition:background .13s,color .13s}
.side-action:hover{background:var(--bg-2);color:var(--text)}
.side-action svg{width:15px;height:15px}
/* -------- Context menu -------- */
#ctx-menu{position:fixed;z-index:400;min-width:190px;background:var(--bg-3);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-pop);padding:5px;display:flex;flex-direction:column}
.ctx-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:6px;font-size:13.5px;font-weight:500;text-align:left;color:var(--text-dim)}
.ctx-item:hover{background:var(--accent-soft);color:var(--text)}
.ctx-item.danger:hover{background:var(--danger-soft);color:var(--danger)}
.ctx-item svg{width:15px;height:15px;flex-shrink:0}
.ctx-sep{height:1px;background:var(--border-soft);margin:4px 6px}
/* -------- Call UI -------- */
#call-modal{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55);backdrop-filter:blur(6px)}
.call-card{width:340px;background:var(--bg-2);border:1px solid var(--border);border-radius:18px;padding:30px 26px;text-align:center;box-shadow:var(--shadow-pop)}
.call-card .avatar{width:84px;height:84px;font-size:28px;margin:0 auto 14px;animation:callPulse 1.6s ease-in-out infinite}
@keyframes callPulse{0%,100%{box-shadow:0 0 0 0 var(--accent-glow)}50%{box-shadow:0 0 0 14px transparent}}
.call-card h3{font-family:var(--font-display);font-size:19px;margin-bottom:4px}
.call-card p{color:var(--text-dim);font-size:13.5px;margin-bottom:22px}
.call-actions{display:flex;gap:12px;justify-content:center}
.call-btn{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .12s,filter .12s}
.call-btn:hover{transform:scale(1.07);filter:brightness(1.1)}
.call-btn svg{width:24px;height:24px}
.call-btn.accept{background:var(--ok);color:#06251A}
.call-btn.decline{background:var(--danger);color:#fff}
.call-log{display:flex;align-items:center;gap:9px;padding:9px 12px;border:1px solid var(--border);border-radius:10px;background:var(--bg-3);color:var(--text-dim);font-size:13.5px;width:fit-content}
.call-log svg{width:16px;height:16px;color:var(--accent)}
#mh-timer{font-variant-numeric:tabular-nums;font-size:12.5px;color:var(--accent-strong);background:var(--accent-soft);border-radius:6px;padding:2px 8px;margin-left:4px}
#vd-timer{font-size:11px;color:var(--text-faint);font-variant-numeric:tabular-nums}
/* -------- Music bar -------- */
#music-bar{display:none;align-items:center;gap:10px;margin:0 18px 10px;padding:9px 14px;border:1px solid var(--border);border-radius:12px;background:var(--bg-3);font-size:13.5px}
#music-bar.show{display:flex}
#music-bar .mb-icon{color:var(--accent);display:flex;animation:spin 4s linear infinite}
#music-bar.paused .mb-icon{animation-play-state:paused}
@keyframes spin{to{transform:rotate(360deg)}}
#music-bar .mb-icon svg{width:17px;height:17px}
#mb-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
#mb-sub{color:var(--text-faint);font-size:12px;flex-shrink:0}
#music-bar button{color:var(--text-dim);display:flex;padding:4px;border-radius:6px}
#music-bar button:hover{color:var(--text);background:var(--bg-4)}
#music-bar button svg{width:16px;height:16px}
/* -------- Profile extras -------- */
.pc-banner{background-size:cover;background-position:center}
.pc-uid{font-size:11px;color:var(--text-faint);margin-top:2px;font-variant-numeric:tabular-nums}
.pc-actions{display:flex;gap:8px;margin-top:12px}
.pc-actions .btn{flex:1;font-size:13px;padding:7px 10px}
.grad-row{display:flex;gap:8px;align-items:center;margin-top:8px}
.grad-row input[type=color]{width:38px;height:30px;border:none;border-radius:6px;background:none;padding:0;cursor:pointer}
.member-row.offline{opacity:.45}
.vtile.bot .avatar{background:linear-gradient(135deg,var(--accent),hsl(calc(var(--accent-h) + 40) 70% 45%)) !important;color:#06251A}
.members-sec{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text-faint);margin:14px 4px 6px}
.members-sec:first-child{margin-top:0}

/* -------- Sidebar -------- */
#sidebar{width:264px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg-1);border-right:1px solid var(--border-soft)}
#brand{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border-soft);min-height:54px}
#brand svg{width:22px;height:22px}
#brand .name{font-family:var(--font-display);font-weight:700;font-size:17px;letter-spacing:-.3px}
#brand .hint{margin-left:auto;font-size:11px;color:var(--text-faint);background:var(--bg-2);border:1px solid var(--border-soft);border-radius:6px;padding:3px 7px;cursor:pointer;transition:color .15s}
#brand .hint:hover{color:var(--text-dim)}
#channel-list{flex:1;overflow-y:auto;padding:12px 8px}
.channel-group{margin-bottom:18px}
.channel-group-header{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text-faint);padding:0 8px;margin-bottom:5px}
.channel-item{display:flex;align-items:center;gap:8px;padding:5px 8px;margin:0;min-height:30px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text-dim);transition:background .13s,color .13s;user-select:none;position:relative}
.channel-item:hover{background:var(--bg-2);color:var(--text)}
.channel-item.active{background:var(--accent-soft);color:var(--text)}
.channel-item.active::before{content:'';position:absolute;left:-10px;top:20%;bottom:20%;width:3px;border-radius:3px;background:var(--accent)}
.channel-item .ch-icon{width:16px;flex-shrink:0;color:var(--text-faint);display:flex}
.ch-icon svg{width:16px;height:16px}
.channel-item .ch-unread{width:7px;height:7px;border-radius:50%;background:var(--text);margin-left:auto}
.channel-item .ch-add{margin-left:auto;color:var(--text-faint);display:none}
.sb-label svg{width:13px;height:13px}
.channel-item.active .ch-icon{color:var(--accent)}
.channel-item .ch-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.channel-item .ch-live{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok)}
.vc-members{padding:1px 0 4px 24px;display:flex;flex-direction:column;gap:2px}
.vc-member{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--text-dim);padding:2px 6px;border-radius:6px}
.vc-member .mini-av{width:18px;height:18px;border-radius:50%;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff;background-size:cover;background-position:center}
.vc-member.speaking .mini-av{box-shadow:0 0 0 2px var(--accent)}
.vc-member .m-mute{margin-left:auto;color:var(--danger);display:flex}
.vc-member .m-mute svg{width:12px;height:12px}

/* voice dock (persistent while connected) */
#voice-dock{display:none;flex-direction:column;gap:8px;margin:0 10px 8px;padding:10px 12px;background:var(--bg-2);border:1px solid var(--border);border-radius:12px}
#voice-dock.show{display:flex}
#voice-dock .vd-top{display:flex;align-items:center;gap:8px}
#vd-signal{width:9px;height:9px;border-radius:50%;background:var(--ok);flex-shrink:0;box-shadow:0 0 8px var(--ok)}
#vd-signal.warn{background:var(--warn);box-shadow:0 0 8px var(--warn)}
#vd-signal.bad{background:var(--danger);box-shadow:0 0 8px var(--danger)}
#vd-info{flex:1;min-width:0}
#vd-status{font-size:12px;font-weight:700;color:var(--accent-strong)}
#vd-channel{font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#vd-leave{color:var(--text-dim);padding:6px;border-radius:7px;display:flex;transition:all .13s}
#vd-leave:hover{background:var(--danger-soft);color:var(--danger)}
#vd-leave svg{width:17px;height:17px}

/* user panel */
#user-panel{display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--bg-2);border-top:1px solid var(--border-soft);min-height:60px}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;user-select:none;flex-shrink:0;background-size:cover;background-position:center;position:relative}
#up-avatar{width:36px;height:36px;font-size:14px;cursor:pointer}
.status-dot{position:absolute;right:-2px;bottom:-2px;width:13px;height:13px;border-radius:50%;border:3px solid var(--bg-2);background:var(--ok)}
.status-dot.idle{background:var(--idle)} .status-dot.dnd{background:var(--dnd)}
#up-info{flex:1;min-width:0;cursor:pointer;border-radius:6px;padding:2px 5px;margin-left:-5px;transition:background .13s}
#up-info:hover{background:var(--bg-3)}
#up-name{display:block;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#up-status{display:block;font-size:11.5px;color:var(--text-dim)}
.icon-btn{padding:7px;border-radius:8px;color:var(--text-dim);display:flex;transition:all .13s;position:relative}
.icon-btn:hover{background:var(--bg-3);color:var(--text)}
.icon-btn.on{color:var(--danger);background:var(--danger-soft)}
.icon-btn svg{width:18px;height:18px}

/* ============================================================
   MAIN AREA
   ============================================================ */
#main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg-2)}
#main-header{display:flex;align-items:center;gap:10px;padding:0 18px;min-height:54px;border-bottom:1px solid var(--border-soft);flex-shrink:0}
#mh-icon{display:flex;color:var(--text-faint)}
#mh-icon svg{width:20px;height:20px}
#mh-name{font-family:var(--font-display);font-weight:700;font-size:16px}
#mh-sub{font-size:12.5px;color:var(--text-faint);margin-left:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#mh-actions{margin-left:auto;display:flex;gap:4px}
#hamburger{display:none}

/* -------- Voice stage -------- */
#voice-stage{flex:1;display:flex;flex-direction:column;min-height:0}
#screen-theater{display:none;flex-wrap:wrap;gap:12px;padding:14px 18px 0;justify-content:center}
#screen-theater.show{display:flex}
.screen-box{position:relative;background:#000;border-radius:12px;overflow:hidden;border:1px solid var(--border);max-width:min(860px,100%);flex:1 1 420px}
.screen-box video{width:100%;max-height:52vh;display:block;background:#000}
.screen-box .sb-label{position:absolute;left:10px;bottom:10px;background:rgba(0,0,0,.65);color:#fff;font-size:12px;font-weight:600;padding:4px 10px;border-radius:7px;display:flex;align-items:center;gap:6px}
.screen-box .sb-stop{position:absolute;right:10px;top:10px;background:var(--danger);color:#fff;font-size:12px;font-weight:700;padding:5px 11px;border-radius:7px}
.screen-box .sb-expand{position:absolute;right:10px;bottom:10px;background:rgba(0,0,0,.65);color:#fff;padding:5px;border-radius:7px;display:flex}
.screen-box .sb-expand svg{width:15px;height:15px}
#tile-grid{flex:1;display:flex;flex-wrap:wrap;gap:18px;align-items:center;align-content:center;justify-content:center;padding:24px;overflow-y:auto;min-height:0}
.vtile{display:flex;flex-direction:column;align-items:center;gap:10px;padding:22px 26px 16px;background:var(--bg-3);border:1px solid var(--border);border-radius:16px;min-width:150px;transition:border-color .2s, box-shadow .2s, transform .2s;animation:tileIn .25s ease}
@keyframes tileIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.vtile.talking{border-color:var(--accent);box-shadow:0 0 22px var(--accent-glow)}
.vtile .av-wrap{position:relative;width:72px;height:72px}
.vtile .avatar{width:72px;height:72px;font-size:24px}
.vtile.muted-remote .avatar,.vtile.muted .avatar{opacity:.55}
/* signature: sonar rings when talking */
.vtile .ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--accent);opacity:0;pointer-events:none}
.vtile.talking .ring1{animation:ring 1.5s ease-out infinite}
.vtile.talking .ring2{animation:ring 1.5s ease-out .5s infinite}
.vtile.talking .ring3{animation:ring 1.5s ease-out 1s infinite}
@keyframes ring{0%{transform:scale(1);opacity:.75}100%{transform:scale(1.75);opacity:0}}
.vtile .vt-name{font-size:14px;font-weight:600;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.vtile .vt-name:hover{text-decoration:underline}
.vtile .vt-badges{display:flex;gap:6px;align-items:center;min-height:18px}
.badge{display:none;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:6px}
.badge svg{width:11px;height:11px}
.badge.b-mute{background:var(--danger-soft);color:var(--danger)}
.badge.b-deaf{background:var(--danger-soft);color:var(--danger)}
.badge.b-live{background:var(--accent-soft);color:var(--accent-strong)}
.badge.b-you{background:var(--bg-4);color:var(--text-dim);display:flex}
.vtile.muted-remote .b-mute,.vtile.muted .b-mute{display:flex}
.vtile.deafened .b-deaf{display:flex}
.vtile.sharing .b-live{display:flex}
#voice-hintbar{display:flex;justify-content:center;padding:0 18px 6px}
#voice-status{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-dim);background:var(--bg-3);border:1px solid var(--border-soft);padding:7px 14px;border-radius:99px}
#conn-ind{width:8px;height:8px;border-radius:50%;background:var(--ok)}
#conn-ind.warn{background:var(--warn)} #conn-ind.bad{background:var(--danger)}

/* voice toolbar */
#voice-toolbar{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 18px;flex-wrap:wrap;flex-shrink:0}
.tb-btn{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:66px;padding:9px 12px;border-radius:12px;background:var(--bg-3);border:1px solid var(--border);color:var(--text);transition:all .14s}
.tb-btn:hover{background:var(--bg-4);transform:translateY(-1px)}
.tb-btn svg{width:19px;height:19px}
.tb-btn span{font-size:10.5px;font-weight:600;color:var(--text-dim)}
.tb-btn.danger-on{background:var(--danger-soft);border-color:var(--danger);color:var(--danger)}
.tb-btn.danger-on span{color:var(--danger)}
.tb-btn.accent-on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-strong)}
.tb-btn.accent-on span{color:var(--accent-strong)}
.tb-btn.leave{background:var(--danger-soft);border-color:transparent;color:var(--danger)}
.tb-btn.leave:hover{background:var(--danger);color:#fff}
.tb-btn.leave:hover span{color:#fff}
.tb-btn.leave span{color:var(--danger)}
.tb-sep{width:1px;height:38px;background:var(--border)}
.device-col{display:flex;flex-direction:column;gap:5px}
.device-row{display:flex;align-items:center;gap:6px}
.device-row label{font-size:10px;font-weight:700;color:var(--text-faint);width:26px;text-align:right}
.device-row select{padding:5px 8px;background:var(--bg-1);border:1px solid var(--border);border-radius:7px;font-size:12px;max-width:180px;color:var(--text)}
#ptt-hint{font-size:11px;color:var(--text-faint)}
kbd{background:var(--bg-4);border:1px solid var(--border);border-bottom-width:2px;border-radius:5px;padding:1px 6px;font-size:11px;font-family:var(--font-body)}

/* -------- Chat stage -------- */
#chat-stage{flex:1;display:flex;flex-direction:column;min-height:0}
#messages{flex:1;overflow-y:auto;padding:18px 18px 8px;min-height:0}
.date-sep{display:flex;align-items:center;gap:12px;margin:18px 0 8px;color:var(--text-faint);font-size:11.5px;font-weight:700}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border-soft)}
.msg{display:flex;gap:13px;padding:2px 8px;border-radius:8px;margin-top:14px;position:relative}
.msg:hover{background:var(--bg-3)}
.msg.cont{margin-top:0}
.msg .m-avatar{width:38px;height:38px;font-size:15px;margin-top:2px;cursor:pointer}
.msg.cont .m-avatar{visibility:hidden;height:0;margin:0}
.msg.cont .m-gutter{width:38px;flex-shrink:0;font-size:10px;color:var(--text-faint);opacity:0;text-align:right;padding-top:4px}
.msg:hover .m-gutter{opacity:1}
.m-body{min-width:0;flex:1;padding:2px 0}
.m-head{display:flex;align-items:baseline;gap:8px;margin-bottom:1px}
.m-user{font-size:14.5px;font-weight:600;cursor:pointer}
.m-user:hover{text-decoration:underline}
.m-time{font-size:11px;color:var(--text-faint)}
.m-content{font-size:14.5px;line-height:1.45;word-wrap:break-word;overflow-wrap:anywhere;white-space:pre-wrap;color:var(--text)}
.m-content a{color:var(--accent-strong)}
.m-content img.embed{display:block;max-width:min(380px,100%);max-height:320px;border-radius:10px;margin-top:6px;cursor:pointer;background:var(--bg-1)}
body.compact .msg{margin-top:4px}
body.compact .m-content{font-size:13.5px}
#typing-bar{min-height:22px;padding:1px 26px;font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
.typing-dots{display:inline-flex;gap:3px}
.typing-dots i{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:tdot 1.2s infinite}
.typing-dots i:nth-child(2){animation-delay:.2s}.typing-dots i:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{opacity:.25;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
#composer{display:flex;align-items:flex-end;gap:6px;margin:0 16px 16px;padding:8px 10px;background:var(--bg-3);border:1px solid var(--border);border-radius:14px;position:relative}
#composer:focus-within{border-color:var(--accent)}
#chat-input{flex:1;background:none;border:none;resize:none;font-size:14.5px;line-height:1.45;max-height:150px;min-height:24px;padding:4px 6px}
#send-btn{color:var(--accent-strong)}
#send-btn:disabled{color:var(--text-faint);cursor:default}
.upload-preview{position:absolute;bottom:calc(100% + 8px);left:0;background:var(--bg-3);border:1px solid var(--border);border-radius:12px;padding:10px;display:flex;gap:10px;align-items:center;box-shadow:var(--shadow-pop)}
.upload-preview img{max-width:120px;max-height:90px;border-radius:8px}
.upload-preview .up-x{color:var(--text-dim);padding:4px}

/* -------- Members sidebar -------- */
#members{width:236px;flex-shrink:0;background:var(--bg-1);border-left:1px solid var(--border-soft);padding:16px 10px;overflow-y:auto}

.member-row{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:8px;cursor:pointer;transition:background .13s}
.member-row:hover{background:var(--bg-2)}
.member-row .avatar{width:30px;height:30px;font-size:12px}
.member-row .status-dot{width:11px;height:11px;border-width:2.5px;border-color:var(--bg-1)}
.member-row .mr-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.member-row .mr-sub{font-size:11px;color:var(--text-faint);display:block}
.member-empty{font-size:12.5px;color:var(--text-faint);padding:4px 8px;line-height:1.5}

/* ============================================================
   OVERLAYS: modal, popouts, quick switcher, toasts
   ============================================================ */
.overlay{position:fixed;inset:0;background:rgba(2,6,12,.66);z-index:100;display:flex;align-items:center;justify-content:center;animation:fade .15s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-2);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-pop);animation:pop .18s ease}

/* settings */
#settings-modal{width:820px;max-width:calc(100vw - 28px);height:600px;max-height:calc(100vh - 40px);display:flex;overflow:hidden}
#settings-nav{width:196px;flex-shrink:0;background:var(--bg-1);padding:18px 10px;border-right:1px solid var(--border-soft);overflow-y:auto}

.snav-item{display:block;width:100%;text-align:left;padding:8px 10px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text-dim);margin-bottom:2px;transition:all .12s}

#settings-body{flex:1;padding:26px 30px;overflow-y:auto;position:relative}
#settings-close{position:absolute;top:16px;right:16px}
.spane h3{font-family:var(--font-display);font-size:19px;font-weight:700;margin-bottom:20px}
.sfield{margin-bottom:22px}
.sfield>label{display:block;font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px}
.sfield select,.sfield input[type=text],.sfield textarea{width:100%;padding:9px 12px;background:var(--bg-1);border:1px solid var(--border);border-radius:9px;font-size:14px}
.sfield textarea{resize:vertical;min-height:64px}
.sfield .desc{font-size:12.5px;color:var(--text-faint);margin-top:6px;line-height:1.45}
.srow{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:11px 0;border-bottom:1px solid var(--border-soft)}
.srow .sl{font-size:14.5px;font-weight:500}
.srow .sl small{display:block;font-size:12px;color:var(--text-faint);font-weight:400;margin-top:2px}
.toggle{position:relative;width:42px;height:24px;background:var(--bg-4);border-radius:99px;transition:background .18s;flex-shrink:0}
.toggle::after{content:'';position:absolute;left:3px;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .18s}
.toggle.on{background:var(--accent)}
.toggle.on::after{transform:translateX(18px)}
input[type=range]{width:100%;accent-color:var(--accent)}
.swatch-row{display:flex;gap:8px;flex-wrap:wrap}
.swatch{width:34px;height:34px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .12s}
.swatch:hover{transform:scale(1.12)}
.swatch.sel{border-color:var(--text)}
.theme-cards{display:flex;gap:10px;flex-wrap:wrap}
.theme-card{width:120px;border-radius:12px;border:2px solid var(--border);overflow:hidden;cursor:pointer;transition:border-color .15s}
.theme-card.sel{border-color:var(--accent)}
.server-settings-modal{width:780px;max-width:calc(100vw - 28px);height:580px;max-height:calc(100vh - 40px);display:flex;overflow:hidden}
.server-settings-nav{width:186px;flex-shrink:0;background:var(--bg-1);padding:18px 10px;border-right:1px solid var(--border-soft);overflow-y:auto}
.server-settings-nav h5{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text-faint);padding:0 10px;margin:0 0 8px}
.server-settings-body{flex:1;padding:26px 30px;overflow-y:auto;position:relative}
.server-settings-body h3{font-family:var(--font-display);font-size:19px;font-weight:700;margin-bottom:20px}

/* Roles */
.srole-list{display:flex;flex-direction:column;gap:4px;margin-bottom:18px}
.srole-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:background .13s;font-size:14px}
.srole-item:hover{background:var(--bg-3)}
.srole-item.active{background:var(--accent-soft)}
.role-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;background:var(--text-dim)}
.perm-grid{display:flex;flex-direction:column;gap:1px;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px}
.perm-row{display:flex;align-items:center;padding:8px 12px;background:var(--bg-1);gap:10px}
.perm-row:nth-child(even){background:var(--bg-2)}
.perm-row .perm-label{flex:1;font-size:13.5px;font-weight:500}
.perm-row .perm-desc{font-size:11px;color:var(--text-faint);display:block}
.perm-row .perm-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .13s;flex-shrink:0}
.perm-row .perm-check.on{background:var(--accent);border-color:var(--accent)}
.perm-row .perm-check svg{width:13px;height:13px;color:#04211C;display:none}
.perm-row .perm-check.on svg{display:block}
.perm-row .perm-check:hover{border-color:var(--accent)}
.perm-row .perm-check.partial{background:var(--accent-soft);border-color:var(--accent)}

.role-color-input{width:36px;height:36px;border:none;border-radius:8px;cursor:pointer;padding:0;background:none}
.hoist-toggle{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--text-dim)}
.hoist-toggle .toggle{flex-shrink:0}

/* Role badges in members list */
.mr-role-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.mr-role-badge{font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;background:var(--bg-4);color:var(--text-faint);white-space:nowrap}

/* Channel perm overwrite list */
.chperm-list{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.chperm-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--bg-1);font-size:13.5px}
.chperm-item .chperm-name{flex:1;font-weight:500}
.chperm-item .chperm-actions{display:flex;gap:6px}
.chperm-item .chperm-btn{padding:4px 8px;border-radius:6px;font-size:12px;font-weight:600;background:var(--bg-3);color:var(--text-dim);border:1px solid var(--border)}
.chperm-item .chperm-btn:hover{background:var(--bg-4)}
.chperm-item .chperm-btn.on{background:var(--accent-soft);color:var(--accent-strong)}
.chperm-item .chperm-btn.deny{background:var(--danger-soft);color:var(--danger)}

.theme-card .tc-prev{height:58px}
.theme-card .tc-name{font-size:12px;font-weight:600;text-align:center;padding:6px;background:var(--bg-3)}
.btn{padding:9px 16px;border-radius:9px;font-size:14px;font-weight:600;background:var(--bg-4);border:1px solid var(--border);transition:all .13s}
.btn:hover{filter:brightness(1.15)}
.btn.primary{background:var(--accent);color:#04211C;border-color:transparent}
.btn.danger{background:var(--danger);color:#fff;border-color:transparent}
.btn.ghost{background:none}
.meter{height:8px;border-radius:99px;background:var(--bg-1);border:1px solid var(--border);overflow:hidden}
.meter>i{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent-strong));transition:width .08s linear}
.kbd-table{width:100%;border-collapse:collapse;font-size:14px}
.kbd-table td{padding:9px 4px;border-bottom:1px solid var(--border-soft)}
.kbd-table td:last-child{text-align:right}

/* profile editor / popout shared card */
.profile-card{width:300px;border-radius:14px;overflow:hidden;background:var(--bg-3);border:1px solid var(--border)}
.pc-banner{height:72px;background:var(--accent)}
.pc-body{padding:0 14px 14px;position:relative}

.pc-status .dot{width:9px;height:9px;border-radius:50%;background:var(--ok)}
.pc-status .dot.idle{background:var(--idle)}.pc-status .dot.dnd{background:var(--dnd)}
.pc-about{font-size:13px;color:var(--text-dim);line-height:1.5;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-soft);word-wrap:break-word;white-space:pre-wrap}
#profile-popout{position:fixed;z-index:120;animation:pop .16s ease;box-shadow:var(--shadow-pop)}

/* status menu */
#status-menu{position:fixed;z-index:120;background:var(--bg-3);border:1px solid var(--border);border-radius:12px;padding:6px;box-shadow:var(--shadow-pop);animation:pop .14s ease;min-width:170px}
.stm-item{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border-radius:8px;font-size:14px;text-align:left}
.stm-item:hover{background:var(--bg-4)}
.stm-item .dot{width:10px;height:10px;border-radius:50%}

/* quick switcher */
#qs-modal{width:520px;max-width:calc(100vw - 28px);padding:14px;align-self:flex-start;margin-top:14vh}
#qs-input{width:100%;padding:13px 15px;background:var(--bg-1);border:1px solid var(--border);border-radius:10px;font-size:16px}
#qs-input:focus{border-color:var(--accent)}
#qs-results{margin-top:8px;max-height:300px;overflow-y:auto}
.qs-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:14.5px;color:var(--text-dim)}
.qs-item .ch-icon{display:flex;color:var(--text-faint)}
.qs-item.sel{background:var(--accent-soft);color:var(--text)}
.qs-hint{font-size:11.5px;color:var(--text-faint);padding:8px 6px 0;display:flex;gap:12px}

/* popovers (emoji, gif, soundboard) */
.popover{position:fixed;z-index:110;background:var(--bg-3);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-pop);animation:pop .14s ease;padding:12px}
#emoji-pop{width:308px}
#emoji-pop .egrid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;max-height:220px;overflow-y:auto}
#emoji-pop .egrid button{font-size:20px;padding:5px;border-radius:7px}
#emoji-pop .egrid button:hover{background:var(--bg-4)}
#gif-pop{width:340px}
#gif-pop h6,#sb-pop h6{font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px}
#gif-pop input{width:100%;padding:9px 11px;background:var(--bg-1);border:1px solid var(--border);border-radius:8px;font-size:13px}
#gif-preview{margin-top:10px;min-height:40px;display:flex;align-items:center;justify-content:center}
#gif-preview img{max-height:160px;border-radius:8px}
#gif-preview .err{font-size:12px;color:var(--text-faint)}
#gif-pop .row{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}
#sb-pop{width:340px}
#sb-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:240px;overflow-y:auto}
.sb-pad{padding:12px 10px;background:var(--bg-2);border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:all .12s;position:relative}
.sb-pad:hover{border-color:var(--accent);background:var(--accent-soft)}
.sb-pad small{display:block;font-size:10px;color:var(--text-faint);font-weight:500;margin-top:2px}
.sb-pad .sb-del{position:absolute;top:2px;right:4px;color:var(--text-faint);font-size:12px;display:none}
.sb-pad:hover .sb-del{display:block}
.sb-pad .sb-del:hover{color:var(--danger)}
#sb-empty{grid-column:1/-1;font-size:12.5px;color:var(--text-faint);text-align:center;padding:14px 6px;line-height:1.5}
#sb-add{margin-top:10px;width:100%}

/* toasts */
#toasts{position:fixed;right:16px;bottom:16px;z-index:200;display:flex;flex-direction:column;gap:8px;max-width:340px}
.toast{background:var(--bg-3);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:10px;padding:11px 14px;font-size:13.5px;box-shadow:var(--shadow-pop);animation:toastIn .2s ease;line-height:1.4}
.toast.err{border-left-color:var(--danger)}
.toast.warn{border-left-color:var(--warn)}
@keyframes toastIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
.toast.out{opacity:0;transform:translateX(14px);transition:all .25s}

/* image lightbox */
#lightbox{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;cursor:zoom-out}
#lightbox img{max-width:92vw;max-height:92vh;border-radius:8px}

/* responsive */
@media (max-width:1100px){ #members{display:none} }
@media (max-width:860px){
  #sidebar{position:fixed;left:0;top:0;bottom:0;z-index:90;transform:translateX(-100%);transition:transform .22s ease;box-shadow:var(--shadow-pop)}
  #sidebar.open{transform:translateX(0)}
  #hamburger{display:flex}
  #sidebar-scrim{position:fixed;inset:0;z-index:85;background:rgba(0,0,0,.5)}
}

  userDir[u.id] = { id:u.id, username:u.username, avatar_color:u.avatar_color };
  nameToId[u.username] = u.id;

function fmtElapsed(ms){
  const s = Math.floor(ms/1000);
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), ss = s%60;
  return (h? h+':' : '') + String(m).padStart(h?2:1,'0') + ':' + String(ss).padStart(2,'0');
}
function fmtDuration(sec){
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  if(h) return `${h}h ${m}m ${s}s`;
  if(m) return `${m}m ${s}s`;
  return `${s}s`;
}
async function copyText(text, label){
  try{ await navigator.clipboard.writeText(String(text)); toast((label||'Copied')+' to clipboard.'); }

    const ta = el('textarea'); ta.value = String(text); document.body.appendChild(ta);
    ta.select(); try{ document.execCommand('copy'); toast((label||'Copied')+' to clipboard.'); }catch{ toast('Could not copy.','err'); }
    ta.remove();
  }
}

/* ============================================================
   Synth SFX (join/leave/mute blips) â€” Web Audio, no assets
   ============================================================ */
function blip(freqs, dur=0.09, gap=0.07, type='sine', vol=0.12){
  if(!settings.joinSounds) return;
  try{
    const ctx = ensureCtx();
    freqs.forEach((f,i)=>{
      const t0 = ctx.currentTime + i*(dur+gap)*0.9;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(vol, t0+0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
      o.connect(g).connect(ctx.destination);
      o.start(t0); o.stop(t0+dur+0.05);
    });
  }catch{}
}
function ensureCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume().catch(()=>{});
  return audioCtx;
}
const sfx = {
  join:  ()=>blip([523,784]),
  leave: ()=>blip([784,523]),
  peerJoin: ()=>blip([440,660],0.07,0.05,'sine',0.09),
  peerLeave:()=>blip([660,440],0.07,0.05,'sine',0.09),
  mute:  ()=>blip([330],0.06,0,'triangle',0.1),
  unmute:()=>blip([494],0.06,0,'triangle',0.1)
};

async function enterApp(){
  $('auth-screen').classList.add('hidden');
  $('app').classList.remove('hidden');
  rememberUser(currentUser);

  // one-time migration: push a locally saved profile up to the account
  const legacy = store.get('profile', null);
  if(legacy && Object.keys(legacy).length && !Object.keys(myProfile||{}).length){
    myProfile = legacy;
    saveProfileToServer();
    store.del('profile');
  }
  profiles[currentUser.username] = myProfile || {};
  userStatuses[currentUser.username] = myStatus;
  renderUserPanel();

  try{
    servers = await (await api('/api/servers')).json();
  }catch{ toast('Could not load your servers. Refresh to retry.','err'); return; }
  const lastId = store.get('lastServer', null);
  activeServer = servers.find(sv=>sv.id===lastId) || servers[0] || null;

  await Promise.all([loadChannels(), loadDms()]);
  renderRail();
  renderChannels();
  renderDmList();
  connectSocket();
}

function connectSocket(){
  socket = io({ reconnection:true, reconnectionDelay:800, reconnectionDelayMax:6000 });

  socket.on('connect', ()=>{ socket.emit('auth', token); });

  socket.on('authed', (user)=>{
    if(!user){ toast('Your session expired. Please log in again.','err'); logout(); return; }
    $('conn-banner').classList.remove('show');
    if(myStatus !== 'online') socket.emit('status:set', myStatus);
    // always (re)join DM rooms so DMs arrive no matter what you're viewing
    dms.forEach(d=>{ socket.emit('chat:join', d.channelId); joinedChatRooms.add(d.channelId); });
    if(socketFirstAuth){
      socketFirstAuth = false;
      const firstText = channels.find(c=>c.type==='text');
      const first = firstText || channels[0];
      if(first) openChannel(first);
    }else{
      if(currentChatChannel){ socket.emit('chat:join', currentChatChannel.id); joinedChatRooms.add(currentChatChannel.id); syncChat(); }
      if(voiceChannel && !livekitRoom) joinVoice(voiceChannel);
    }
  });

  socket.on('disconnect', ()=>{ $('conn-banner').classList.add('show'); });

  /* ---- chat ---- */
  socket.on('new-message', onIncomingMessage);
  socket.on('dm-message', onDmMessage);
  socket.on('typing', (data)=>{
    if(!currentChatChannel || !data || data.userId === currentUser.id) return;
    if(data.channelId && data.channelId !== currentChatChannel.id) return;
    typingUsers[data.userId] = { username: data.username, ts: Date.now() };
    renderTyping();
  });

  /* ---- presence & status ---- */
  socket.on('presence-sync', ({online, statuses})=>{
    onlineIds.clear();
    (online||[]).forEach(id=>onlineIds.add(id));
    Object.entries(statuses||{}).forEach(([id,st])=>{
      const u = userDir[id]; if(u) userStatuses[u.username] = st;
    });
    renderMembers(); renderDmList();
  });
  socket.on('presence', ({userId, online})=>{
    online ? onlineIds.add(userId) : onlineIds.delete(userId);
    const u = userDir[userId];
    if(u && !online) delete userStatuses[u.username];
    renderMembers(); renderDmList();
  });
  socket.on('status', ({userId, status})=>{
    const u = userDir[userId];
    if(u){ userStatuses[u.username] = status; renderMembers(); renderDmList(); if(u.id===currentUser.id){ myStatus=status; renderUserPanel(); } }
  });

  /* ---- profiles pushed from anywhere (site, desktop app, another tab) ---- */
  socket.on('profile-updated', ({userId, username, profile})=>{
    rememberUser({ id:userId, username, avatar_color: userDir[userId]?.avatar_color });
    if(userId === currentUser.id){ myProfile = profile || {}; profiles[currentUser.username] = myProfile; renderUserPanel(); refreshUserVisuals(currentUser.username); }
    else receiveProfile(username, profile);
  });

  /* ---- structure changes ---- */
  socket.on('channels-changed', ({serverId})=>{ if(activeServer && serverId===activeServer.id){ loadChannels().then(renderChannels); } });
  socket.on('server-members-changed', ({serverId})=>{ if(activeServer && serverId===activeServer.id) loadServerMembers(); });
  socket.on('roles-changed', ({serverId})=>{ if(activeServer && serverId===activeServer.id){ loadRoles().then(renderRolesUi); renderMembers(); } });
  socket.on('member-roles-changed', ({serverId})=>{ if(activeServer && serverId===activeServer.id) renderMembers(); });

  /* ---- music ---- */
  socket.on('music-state', (state)=>{
    if(!state) return;
    if(voiceRoomName && state.room === voiceRoomName){ musicState = state; renderMusicBar(); }
  });

  /* ---- DM calls ---- */
  socket.on('call:incoming', onIncomingCall);
  socket.on('call:cancelled', ({channelId})=>{ if(call && call.channelId===channelId && call.state==='ringing-in') endIncomingRing(); });
  socket.on('call:accepted', ({channelId})=>{ if(call && call.channelId===channelId && call.state==='ringing-out'){ call.state='active'; stopRingLoop(); updateCallUi(); } });
  socket.on('call:declined', ({channelId})=>{
    if(call && call.channelId===channelId && call.state==='ringing-out'){
      toast(`${call.withUser.username} declined the call.`,'warn');
      finishDmCall(true); // logs a missed call
    }
  });
}

function renderChannels(){

  vc.innerHTML = ''; tc.innerHTML = '';

    const item = el('div','channel-item');
    item.dataset.id = ch.id; item.dataset.type = ch.type;
    const icon = el('span','ch-icon');
    icon.appendChild(svgUse(ch.type==='voice' ? 'i-speaker' : 'i-hash'));
    item.appendChild(icon);
    item.appendChild(el('span','ch-name', ch.name));

      vc.appendChild(item); vc.appendChild(members);

function renderDmList(){
  const list = $('dm-list');
  if(!list) return;
  list.innerHTML = '';
  dms.forEach(d=>{
    const row = el('div','dm-row'+(activeChannel && activeChannel.type==='dm' && activeChannel.id===d.channelId ? ' active':''));
    row.dataset.id = d.channelId;
    const av = makeAvatar(d.other.username, d.other.avatar_color, 'avatar');
    const online = onlineIds.has(d.other.id);
    const st = online ? (userStatuses[d.other.username] || 'online') : 'offline';
    const dot = el('span','status-dot '+(st==='online'?'':st));
    if(st==='offline') dot.style.background = 'var(--offline)';
    av.appendChild(dot);
    row.appendChild(av);
    const nm = el('span','dm-name', d.other.username);
    applyNameStyle(nm, d.other.username);
    row.appendChild(nm);
    if(unread.has(d.channelId)) row.appendChild(el('span','ch-unread'));
    row.addEventListener('click', ()=>{ openDm(d); closeSidebarMobile(); });
    bindUserCtx(row, d.other);
    list.appendChild(row);
  });
  if(!dms.length){
    list.appendChild(el('div','member-empty','No conversations yet.'));
  }

function highlightActiveChannel(){
  document.querySelectorAll('.channel-item').forEach(i=>i.classList.remove('active'));
  document.querySelectorAll('.dm-row').forEach(i=>i.classList.remove('active'));
  if(!activeChannel) return;
  if(activeChannel.type==='dm'){
    const row = document.querySelector(`.dm-row[data-id="${activeChannel.id}"]`);
    if(row) row.classList.add('active');
  }else{
    const item = document.querySelector(`.channel-item[data-id="${activeChannel.id}"]`);
    if(item) item.classList.add('active');
  }
}

  modal.append(input, results);
  ov.appendChild(modal);
  document.body.appendChild(ov);
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });
  const run = debounce(async ()=>{
    const q = input.value.trim();
    results.innerHTML = '';
    if(q.length<2){ results.appendChild(el('div','member-empty','Type at least 2 characters.')); return; }
    let list = [];
    try{ list = await (await api('/api/users/search?q='+encodeURIComponent(q))).json(); }catch{}
    if(!list.length){ results.appendChild(el('div','member-empty','No one found.')); return; }
    list.forEach(u=>{
      rememberUser(u);
      const item = el('div','qs-item');
      const av = makeAvatar(u.username, u.avatar_color, 'avatar');
      av.style.width='26px'; av.style.height='26px'; av.style.fontSize='10px';
      item.append(av, el('span', null, u.username), el('span','mr-sub','#'+u.id));
      item.addEventListener('click', ()=>{ ov.remove(); openDmWithUser(u.id); });
      results.appendChild(item);
    });
  }, 250);
  input.addEventListener('input', run);
  setTimeout(()=>input.focus(), 20);
}

/* ---- Server Settings modal (roles, perms, channels, auto-role, icon) ---- */
let ssOv = null;
let ssActiveRole = null;

function openServerSettings(sv){
  closeOverlayById('ss-ov');
  const ov = el('div','overlay'); ov.id='ss-ov';
  const modal = el('div','modal server-settings-modal');
  const nav = el('div','server-settings-nav');
  const body = el('div','server-settings-body');
  modal.append(nav, body); ov.appendChild(modal);
  document.body.appendChild(ov); ssOv = ov;
  ov.addEventListener('click', e=>{ if(e.target===ov) closeSs(); });

  const panes = [];
  if(sv.owner_id === currentUser.id || true){ // all members can see roles, only manage_roles can edit
    panes.push(['roles','Roles', ()=>paneRoles(sv, body)]);
    panes.push(['channels','Channels', ()=>paneChannels(sv, body)]);
  }
  panes.push(['general','General', ()=>paneGeneral(sv, body)]);

  nav.appendChild(el('h5', null, 'Server settings'));
  let navItems = [];
  panes.forEach(([id, label, build])=>{
    const b = el('button','snav-item', label);
    b.addEventListener('click', ()=>{ navItems.forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderPane(build); });
    navItems.push(b); nav.appendChild(b);
  });
  const lo = el('button','snav-item danger','Close');
  lo.addEventListener('click', closeSs);
  nav.appendChild(lo);

  function renderPane(build){
    body.innerHTML = '';
    body.appendChild(build());
  }
  navItems[0].classList.add('active');
  renderPane(()=>paneRoles(sv, body));

  loadRolesAndSettings(sv);
}

async function loadRolesAndSettings(sv){
  try{
    const [roles, settings] = await Promise.all([
      (await api(`/api/servers/${sv.id}/roles`)).json(),
      (await api(`/api/servers/${sv.id}/settings`)).json()
    ]);
    serverRoles = roles;
    serverSettings = settings;
    renderRolesUi();
  }catch{}
  try{ await fetchMyPerms(sv.id); }catch{}
}

function closeSs(){ if(ssOv){ ssOv.remove(); ssOv=null; } }

/* ---- General settings tab ---- */
function paneGeneral(sv, body){
  const pane = el('div','spane');
  pane.appendChild(el('h3', null, 'General'));

  const canEdit = sv.owner_id === currentUser.id || hasPermCheck(myPerms[sv.id]||0, PERM_BITS.MANAGE_SERVER);

  // Server icon
  const iconField = el('div','sfield');
  iconField.appendChild(el('label', null, 'Server icon'));
  const curIcon = el('div'); curIcon.style.cssText='display:flex;align-items:center;gap:12px;margin-bottom:10px';
  const iconPreview = el('div'); iconPreview.style.cssText='width:48px;height:48px;border-radius:14px;background:var(--bg-2);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--text-dim);border:1px solid var(--border)';
  if(sv.icon) iconPreview.style.backgroundImage = `url("${sv.icon}")`;
  else iconPreview.textContent = getInitials(sv.name);
  curIcon.appendChild(iconPreview);
  const iconBtns = el('div'); iconBtns.style.cssText='display:flex;gap:6px';
  const upIcon = el('button','btn', 'Upload icon');
  const remIcon = el('button','btn ghost', 'Remove');
  iconBtns.append(upIcon, remIcon);
  curIcon.appendChild(iconBtns);
  iconField.appendChild(curIcon);
  if(!canEdit) iconField.appendChild(el('div','desc','Only the server owner or members with Manage Server can change this.'));
  pane.appendChild(iconField);

  const iconFile = el('input'); iconFile.type='file'; iconFile.accept='image/*'; iconFile.className='hidden';
  iconFile.onchange = async ()=>{
    const f = iconFile.files[0]; iconFile.value='';
    if(!f) return;
    try{
      let dataUrl;
      if(f.type==='image/gif' && f.size < 150000){
        dataUrl = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(f); });
      }else{
        dataUrl = await compressImage(f, 150000);
      }
      if(!dataUrl || dataUrl.length > 200000){ toast('Icon too large.'); return; }
      await api(`/api/servers/${sv.id}/icon`, { method:'PUT', body:JSON.stringify({icon: dataUrl}) });
      sv.icon = dataUrl;
      toast('Server icon updated.');
      renderRail();
      closeSs();
    }catch{ toast('Failed.'); }
  };
  document.body.appendChild(iconFile);
  upIcon.addEventListener('click', ()=>iconFile.click());
  remIcon.addEventListener('click', async ()=>{
    if(!canEdit){ toast('No permission.'); return; }
    await api(`/api/servers/${sv.id}/icon`, { method:'PUT', body:JSON.stringify({icon: ''}) });
    sv.icon = '';
    renderRail(); closeSs();
  });

  // Auto-role
  const arField = el('div','sfield');
  arField.appendChild(el('label', null, 'Auto-role for new members'));
  if(canEdit){
    const arSel = el('select');
    const none = el('option', null, 'None (no auto-role)'); none.value=''; arSel.appendChild(none);
    serverRoles.forEach(r=>{
      const o = el('option', null, r.name); o.value=r.id;
      if(serverSettings.auto_role_id == r.id) o.selected = true;
      arSel.appendChild(o);
    });
    arSel.addEventListener('change', async ()=>{
      try{
        await api(`/api/servers/${sv.id}/settings`, { method:'PUT', body:JSON.stringify({auto_role_id: arSel.value ? parseInt(arSel.value,10) : null}) });
        toast('Auto-role updated.');
        serverSettings.auto_role_id = arSel.value ? parseInt(arSel.value,10) : null;
      }catch{ toast('Failed to update.','err'); }
    });
    arField.appendChild(arSel);
  } else {
    arField.appendChild(el('div','desc','Only the server owner or members with Manage Server can change this.'));
  }
  pane.appendChild(arField);

  // Invite code
  const invField = el('div','sfield');
  invField.appendChild(el('label', null, 'Invite code'));
  const invRow = el('div'); invRow.style.cssText='display:flex;gap:8px;align-items:center';
  const invCode = el('code', null, sv.invite_code); invCode.style.cssText='background:var(--bg-3);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:14px';
  const invBtn = el('button','btn ghost','Copy');
  invBtn.addEventListener('click', ()=>copyText(sv.invite_code, 'Invite code'));
  invRow.append(invCode, invBtn);
  invField.appendChild(invRow);
  pane.appendChild(invField);

  const ownerName = sv.owner_id ? (serverMembers.find(m=>m.id===sv.owner_id)?.username || '?') : 'Ripple';
  pane.appendChild(el('div','desc', `Server owner: ${ownerName} · ${serverMembers.length} members`));
  return pane;
}

/* ---- Roles tab ---- */
function paneRoles(sv, body){
  const pane = el('div','spane');
  pane.appendChild(el('h3', null, 'Roles'));
  const canEdit = sv.owner_id === currentUser.id || hasPermCheck(myPerms[sv.id]||0, PERM_BITS.MANAGE_ROLES);

  const list = el('div','srole-list'); list.id = 'server-roles-list';
  pane.appendChild(list);

  if(canEdit){
    const addBtn = el('button','btn','Create role');
    addBtn.addEventListener('click', async ()=>{
      const r = await (await api(`/api/servers/${sv.id}/roles`, { method:'POST', body:'{}' })).json();
      if(r.error){ toast(r.error,'err'); return; }
      serverRoles.push(r);
      renderRolesUi();
      // open role editor for the new role
      ssActiveRole = r.id;
      openRoleEditor(sv, r, body);
    });
    pane.appendChild(addBtn);
  }

  // Role editor inline below
  const editorArea = el('div'); editorArea.id = 'role-editor-area';
  pane.appendChild(editorArea);

  // Click on role to edit
  list.addEventListener('click', (e)=>{
    const item = e.target.closest('.srole-item');
    if(!item || !canEdit) return;
    const rid = parseInt(item.dataset.rid, 10);
    const role = serverRoles.find(r=>r.id===rid);
    if(role){ ssActiveRole = rid; openRoleEditor(sv, role, body); }
  });

  renderRolesUi();
  if(ssActiveRole){
    const role = serverRoles.find(r=>r.id===ssActiveRole);
    if(role) openRoleEditor(sv, role, body);
  }
  return pane;
}

function renderRolesUi(){
  const list = $('server-roles-list');
  if(!list) return;
  list.innerHTML = '';
  serverRoles.sort((a,b)=> (b.position||0) - (a.position||0));
  serverRoles.forEach(r=>{
    const item = el('div','srole-item'+(ssActiveRole===r.id?' active':''));
    item.dataset.rid = r.id;
    const dot = el('span','role-dot');
    dot.style.background = r.color || 'var(--text-dim)';
    item.appendChild(dot);
    item.appendChild(el('span', null, `@${r.name}`));
    list.appendChild(item);
  });
}

function openRoleEditor(sv, role, body){
  const area = $('role-editor-area');
  if(!area) return;
  const canEdit = sv.owner_id === currentUser.id || hasPermCheck(myPerms[sv.id]||0, PERM_BITS.MANAGE_ROLES);

  area.innerHTML = '';
  const card = el('div'); card.style.cssText='background:var(--bg-3);border:1px solid var(--border);border-radius:12px;padding:18px;margin-top:14px';

  // Role name
  const nf = el('div','sfield');
  nf.appendChild(el('label', null, 'Role name'));
  const nameInput = el('input'); nameInput.type='text'; nameInput.maxLength=32; nameInput.value=role.name;
  nf.appendChild(nameInput);
  card.appendChild(nf);

  // Role color
  const cf = el('div','sfield');
  cf.appendChild(el('label', null, 'Role color'));
  const cRow = el('div'); cRow.style.cssText='display:flex;gap:10px;align-items:center';
  const colorInput = el('input'); colorInput.type='color'; colorInput.className='role-color-input';
  colorInput.value = role.color || '#3FE0C5';
  const colorHex = el('input'); colorHex.type='text'; colorHex.maxLength=7; colorHex.style.cssText='width:80px;padding:6px 8px;background:var(--bg-1);border:1px solid var(--border);border-radius:7px;font-size:13px';
  colorHex.value = role.color || '#3FE0C5';
  colorInput.addEventListener('input', ()=>{ colorHex.value = colorInput.value; role.color = colorInput.value; });
  colorHex.addEventListener('input', ()=>{ if(/^#[0-9a-fA-F]{6}$/.test(colorHex.value)){ colorInput.value = colorHex.value; role.color = colorHex.value; } });
  const clearColor = el('button','btn ghost','Clear');
  clearColor.addEventListener('click', ()=>{ role.color = null; colorInput.value = '#3FE0C5'; colorHex.value = ''; });
  cRow.append(colorInput, colorHex, clearColor);
  cf.appendChild(cRow);
  cf.appendChild(el('div','desc','Members with this role will have their name colored in chat and the member list.'));
  card.appendChild(cf);

  // Hoist (show separately)
  const hf = el('div','sfield');
  const hRow = el('div','hoist-toggle');
  hRow.appendChild(el('span', null, 'Display role members separately in the member list'));
  const ht = mkToggle(()=>!!role.hoist, v=>{ role.hoist = v ? 1 : 0; });
  hRow.appendChild(ht);
  hf.appendChild(hRow);
  card.appendChild(hf);

  // Permissions grid
  const permField = el('div','sfield');
  permField.appendChild(el('label', null, 'Permissions'));
  const grid = el('div','perm-grid');
  const permDefs = [
    [PERM_BITS.ADMINISTRATOR, 'Administrator', 'Full access to all server and channel settings'],
    [PERM_BITS.MANAGE_SERVER, 'Manage Server', 'Edit server name, icon, and settings'],
    [PERM_BITS.MANAGE_ROLES, 'Manage Roles', 'Create, edit, and delete roles'],
    [PERM_BITS.MANAGE_CHANNELS, 'Manage Channels', 'Create, edit, and delete channels'],
    [PERM_BITS.MANAGE_MESSAGES, 'Manage Messages', 'Delete or pin messages by other members'],
    [PERM_BITS.KICK_MEMBERS, 'Kick Members', 'Remove members from the server'],
    [PERM_BITS.BAN_MEMBERS, 'Ban Members', 'Ban members from the server'],
    [PERM_BITS.MUTE_MEMBERS, 'Mute Members', 'Mute other members in voice channels'],
    [PERM_BITS.DEAFEN_MEMBERS, 'Deafen Members', 'Deafen other members in voice channels'],
    [PERM_BITS.MOVE_MEMBERS, 'Move Members', 'Move members between voice channels'],
    [PERM_BITS.MANAGE_NICKNAMES, 'Manage Nicknames', 'Change nicknames of other members'],
    [PERM_BITS.CHANGE_NICKNAME, 'Change Nickname', 'Change your own nickname'],
    [PERM_BITS.READ_MESSAGES, 'Read Messages', 'View text and voice channels'],
    [PERM_BITS.SEND_MESSAGES, 'Send Messages', 'Send messages in text channels'],
    [PERM_BITS.CONNECT, 'Connect', 'Join voice channels'],
    [PERM_BITS.SPEAK, 'Speak', 'Talk in voice channels'],
    [PERM_BITS.USE_SOUNDBOARD, 'Use Soundboard', 'Play soundboard sounds'],
    [PERM_BITS.CREATE_INSTANT_INVITE, 'Create Invite', 'Create invite links for the server'],
  ];
  permDefs.forEach(([bit, label, desc])=>{
    const row = el('div','perm-row');
    const lc = el('div');
    lc.appendChild(el('span','perm-label', label));
    lc.appendChild(el('span','perm-desc', desc));
    row.appendChild(lc);
    const check = el('button','perm-check'+(hasPermCheck(role.permissions||0, bit)?' on':''));
    check.innerHTML = '<svg><use href="#i-check"/></svg>';
    // inject check icon inline
    const svgNs = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNs,'svg'); svg.style.cssText='width:13px;height:13px';
    const use = document.createElementNS(svgNs,'use'); use.setAttribute('href','#i-check'); svg.appendChild(use);
    check.innerHTML = ''; check.appendChild(svg);
    check.addEventListener('click', ()=>{
      const on = check.classList.toggle('on');
      if(bit === PERM_BITS.ADMINISTRATOR && on){
        // When admin is enabled, enable all perms
        role.permissions = Object.values(PERM_BITS).reduce((a,b)=>a|b, 0);
        card.querySelectorAll('.perm-check').forEach(c => c.classList.add('on'));
      } else if(bit === PERM_BITS.ADMINISTRATOR && !on){
        role.permissions = 0;
        card.querySelectorAll('.perm-check').forEach(c => c.classList.remove('on'));
      } else {
        if(on) role.permissions = (role.permissions||0) | bit;
        else role.permissions = (role.permissions||0) & ~bit;
      }
    });
    row.appendChild(check);
    grid.appendChild(row);
  });
  permField.appendChild(grid);
  card.appendChild(permField);

  // Save + Delete buttons
  const btnRow = el('div'); btnRow.style.cssText='display:flex;gap:10px;margin-top:16px';
  const saveBtn = el('button','btn primary','Save');
  const delBtn = el('button','btn danger','Delete role');
  btnRow.append(saveBtn, delBtn);
  if(!canEdit) { saveBtn.disabled = true; saveBtn.style.opacity='.5'; delBtn.disabled = true; delBtn.style.opacity='.5'; }
  card.appendChild(btnRow);

  saveBtn.addEventListener('click', async ()=>{
    const payload = {
      name: nameInput.value.trim() || 'new role',
      color: role.color || null,
      hoist: !!role.hoist,
      permissions: Number(role.permissions||0)
    };
    const r = await (await api(`/api/roles/${role.id}`, { method:'PUT', body: JSON.stringify(payload) })).json();
    if(r.error){ toast(r.error,'err'); return; }
    toast('Role saved.');
    Object.assign(role, r);
    renderRolesUi();
  });

  delBtn.addEventListener('click', async ()=>{
    if(!confirm('Delete this role? Members will lose its permissions.')) return;
    const r = await (await api(`/api/roles/${role.id}`, { method:'DELETE' })).json();
    if(r.error){ toast(r.error,'err'); return; }
    serverRoles = serverRoles.filter(x=>x.id!==role.id);
    ssActiveRole = null;
    renderRolesUi();
    openRoleEditor(sv, serverRoles[0] || null, body);
    if(!serverRoles.length) area.innerHTML = '';
  });

  area.appendChild(card);
}

function openChannelPerms(sv, ch){
  closeOverlayById('chperm-ov');
  const ov = el('div','overlay'); ov.id='chperm-ov'; ov.style.alignItems='flex-start';
  const modal = el('div','modal'); modal.style.cssText='width:500px;max-width:calc(100vw - 28px);padding:22px;margin-top:8vh';
  modal.appendChild(el('h3', null, `#${ch.name} permissions`));

  // Role overrides
  const roleList = el('div','srole-list');
  serverRoles.forEach(r=>{
    const item = el('div','chperm-item');
    const dot = el('span','role-dot'); dot.style.background = r.color || 'var(--text-dim)';
    item.appendChild(dot);
    item.appendChild(el('span','chperm-name', `@${r.name}`));

    // fetch existing override
    (async ()=>{
      let ow = null;
      try{
        const ows = await (await api(`/api/channels/${ch.id}/permissions`)).json();
        ow = (ows||[]).find(o => o.type === 'role' && o.target_id === r.id);
      }catch{}
      const act = el('div','chperm-actions');

      const allowBtn = el('button','chperm-btn'+(ow && ow.allow ? ' on' : ''));

function dayKey(d){ return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate(); }
function dayLabel(d){
  const now = new Date(); const today = dayKey(now);
  const yest = new Date(now); yest.setDate(now.getDate()-1);
  const k = dayKey(d);
  if(k===today) return 'Today';
  if(k===dayKey(yest)) return 'Yesterday';
  return d.toLocaleDateString([], {month:'long', day:'numeric', year:'numeric'});
}
function fmtTime(d){
  return d.toLocaleTimeString([], settings.time24 ? {hour:'2-digit',minute:'2-digit',hour12:false} : {hour:'numeric',minute:'2-digit'});
}
function parseServerDate(s){ return new Date(String(s).replace(' ','T') + 'Z'); }

}

const IMG_URL_RE = /^https?:\/\/\S+\.(?:png|jpe?g|gif|webp)(?:\?\S*)?$/i;
const MEDIA_HOST_RE = /^https?:\/\/(?:media\.tenor\.com|\S*\.giphy\.com|i\.imgur\.com)\/\S+$/i;
const URL_RE = /https?:\/\/[^\s<>"]+/g;

function renderContent(content){
  const wrap = el('div','m-content');
  const trimmed = String(content||'').trim();
  // whole message is an image (upload or pasted GIF/image URL) â†’ embed only
  if(trimmed.startsWith('data:image/') || IMG_URL_RE.test(trimmed) || MEDIA_HOST_RE.test(trimmed)){
    wrap.appendChild(makeEmbed(trimmed));
    return wrap;
  }
  // text with safe linkification (DOM building only, never innerHTML)
  let last = 0; const text = String(content||'');
  for(const m of text.matchAll(URL_RE)){
    if(m.index > last) wrap.appendChild(document.createTextNode(text.slice(last, m.index)));
    const a = el('a', null, m[0]);
    a.href = m[0]; a.target = '_blank'; a.rel = 'noopener noreferrer';
    wrap.appendChild(a);
    last = m.index + m[0].length;
  }
  if(last < text.length) wrap.appendChild(document.createTextNode(text.slice(last)));
  // trailing inline image embeds for any image links present
  for(const m of text.matchAll(URL_RE)){
    if(IMG_URL_RE.test(m[0]) || MEDIA_HOST_RE.test(m[0])) wrap.appendChild(makeEmbed(m[0]));
  }
  return wrap;
}
function makeEmbed(src){
  const img = el('img','embed');
  img.loading = 'lazy'; img.alt = 'attachment'; img.src = src;
  img.addEventListener('error', ()=>img.remove());
  img.addEventListener('click', ()=>openLightbox(src));
  return img;
}
function openLightbox(src){
  const lb = el('div'); lb.id = 'lightbox';

async function stageImageFile(file){
  if(!['text','dm'].includes(activeChannel?.type||'')){ toast('Open a text channel or DM to send images.','warn'); return; }
  try{
    const dataUrl = await compressImage(file, 90000);

function compressImage(file, maxChars){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.onload = ()=>{
      let w = img.width, h = img.height, quality = 0.8, maxDim = 640;
      const attempt = ()=>{
        const scale = Math.min(1, maxDim/Math.max(w,h));
        const c = document.createElement('canvas');
        c.width = Math.max(1, Math.round(w*scale)); c.height = Math.max(1, Math.round(h*scale));
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        const out = c.toDataURL('image/jpeg', quality);
        if(out.length <= maxChars || (quality<=0.35 && maxDim<=240)) return out;
        if(quality > 0.35) quality -= 0.15; else maxDim = Math.round(maxDim*0.75);
        return attempt();
      };
      try{ resolve(attempt()); }catch(e){ reject(e); }
      URL.revokeObjectURL(img.src);
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

async function ensureMedia(){
  if(micStream && micStream.active) return true;
  try{
    const ctx = ensureCtx();
    await acquireMic();
    micGain = ctx.createGain();
    mixDest = ctx.createMediaStreamDestination();
    sfxGain = ctx.createGain(); sfxGain.gain.value = 0.9;
    sfxGain.connect(ctx.destination);
    localAnalyser = ctx.createAnalyser(); localAnalyser.fftSize = 256;
    micSource.connect(micGain);
    micGain.connect(mixDest);
    micGain.connect(localAnalyser);
    outboundStream = mixDest.stream;
    outboundTrack = outboundStream.getAudioTracks()[0];
    await refreshDevices();
    return true;
  }catch(err){
    console.warn('getUserMedia failed', err);
    toast('Ripple needs microphone access to join voice. Allow the mic in your browser, then try again.','err', 6500);
    return false;
  }
}
