      deviceId: settings.micId ? { exact: settings.micId } : undefined,
      noiseSuppression: settings.noiseSuppression,
      echoCancellation: settings.echoCancellation,
      autoGainControl: settings.autoGainControl,
      channelCount: 1
    },
    video: false
  };
}

async function acquireMic(){
  const ctx = ensureCtx();
  let stream;
  try{ stream = await navigator.mediaDevices.getUserMedia(micConstraints()); }
  catch(err){
    if(settings.micId){
      settings.micId = ''; store.set('settings', settings);
      stream = await navigator.mediaDevices.getUserMedia(micConstraints());
    } else throw err;
  }
  if(micStream) micStream.getTracks().forEach(t=>t.stop());
  if(micSource){ try{ micSource.disconnect(); }catch{} }
  micStream = stream;
  micSource = ctx.createMediaStreamSource(stream);
  if(micGain) micSource.connect(micGain);
}

async function swapMic(){
  try{ await acquireMic(); toast('Microphone switched.'); }
  catch{ toast('Could not switch to that microphone.','err'); }
}

function applyTxState(){
  const transmitting = !isMuted && !isDeafened && (!pttMode || pttHeld);
  if(outboundTrack) outboundTrack.enabled = transmitting;
  if(livekitRoom && livekitRoom.localParticipant){
    try{
      const pub = Array.from(livekitRoom.localParticipant.trackPublications.values())
        .find(p => p.source === 'microphone');
      if(pub) pub.setMuted(!transmitting);
    }catch{}
    livekitRoom.localParticipant.setAttributes({
      deafened: isDeafened ? 'true' : '',
      muted: !transmitting ? 'true' : ''
    });
  }
  const self = tileFor('local');
  if(self){
    self.classList.toggle('muted', !transmitting);
    self.classList.toggle('deafened', isDeafened);
  }
  syncControlButtons();
  renderMembers();
  refreshSidebarVoiceMembers();
}

function syncControlButtons(){
  const micOn = !(isMuted || isDeafened);
  for(const [btnId, on, useOn, useOff] of [
    ['tb-mute', !micOn, 'i-mic-off', 'i-mic'],
    ['up-mute', !micOn, 'i-mic-off', 'i-mic'],
    ['tb-deafen', isDeafened, 'i-headphones-off', 'i-headphones'],
    ['up-deafen', isDeafened, 'i-headphones-off', 'i-headphones']
  ]){
    const b = $(btnId); if(!b) continue;
    b.classList.toggle('danger-on', on && btnId.startsWith('tb'));
    b.classList.toggle('on', on && btnId.startsWith('up'));
    b.querySelector('use').setAttribute('href', '#'+(on ? useOn : useOff));
  }
  const mLabel = $('tb-mute').querySelector('span'); mLabel.textContent = micOn ? 'Mute' : 'Muted';
  const dLabel = $('tb-deafen').querySelector('span'); dLabel.textContent = isDeafened ? 'Deafened' : 'Deafen';
  $('tb-ptt').classList.toggle('accent-on', pttMode);
  $('tb-ptt').querySelector('span').textContent = pttMode ? 'PTT: hold Space' : 'Push to talk';
}

function toggleMute(){
  isMuted = !isMuted;
  if(!isMuted) isDeafened = false;
  isMuted ? sfx.mute() : sfx.unmute();
  applyTxState();
}
function toggleDeafen(){
  isDeafened = !isDeafened;
  if(isDeafened) isMuted = true; else isMuted = false;
  document.querySelectorAll('#remote-audio audio, .screen-box video.remote').forEach(a=>{ a.muted = isDeafened; });
  isDeafened ? sfx.mute() : sfx.unmute();
  applyTxState();
}
$('tb-mute').addEventListener('click', toggleMute);
$('up-mute').addEventListener('click', toggleMute);
$('tb-deafen').addEventListener('click', toggleDeafen);
$('up-deafen').addEventListener('click', toggleDeafen);
$('tb-ptt').addEventListener('click', ()=>{ pttMode = !pttMode; pttHeld = false; applyTxState(); });

document.addEventListener('keydown', (e)=>{
  if(e.code==='Space' && pttMode && voiceChannel && !e.repeat && !isTypingTarget(e.target)){
    e.preventDefault(); pttHeld = true; applyTxState();
  }
});
document.addEventListener('keyup', (e)=>{
  if(e.code==='Space' && pttMode){ pttHeld = false; applyTxState(); }
});
function isTypingTarget(t){ return t && (t.tagName==='TEXTAREA' || t.tagName==='INPUT' || t.isContentEditable); }

/* ============================================================
   VOICE â€” LiveKit connection / join / leave
   ============================================================ */
const { Room, RoomEvent } = LivekitClient;

async function getLiveKitToken(roomName){
  const res = await fetch('/api/livekit/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': token },
    body: JSON.stringify({ room: roomName })
  });
  if(!res.ok) throw new Error('Failed to get LiveKit token');
  return res.json();
}

async function joinVoice(channel){
  if(voiceChannel && voiceChannel.id === channel.id && voiceChannel.type === channel.type) return;
  if(voiceChannel) localTeardown();
  const ok = await ensureMedia();
  if(!ok) return false;
  voiceChannel = channel;
  voiceRoomName = (channel.type === 'dm' ? 'dm:' : 'ch:') + channel.id;
  sfx.join();
  setConnStatus('ok', 'Connecting to LiveKitâ€¦');
  updateVoiceDock();
  $('tile-grid').innerHTML = '';
  addSelfTile();
  try{
    const { token, url } = await getLiveKitToken(voiceRoomName);
    livekitRoom = new Room({
      adaptiveStream: true,
      dynacast: true,
      videoCaptureDefaults: { resolution: { width: 1920, height: 1080 } },
    });
    setupLiveKitEvents();
    await livekitRoom.connect(url, token);
    if(outboundTrack){
      await livekitRoom.localParticipant.publishTrack(outboundTrack, { source: 'microphone' });
      applyTxState();
    }
    livekitRoom.localParticipant.setAttributes({ deafened: isDeafened ? 'true' : '' });
    setConnStatus('ok', 'Connected Â· LiveKit');
    $('vd-status').textContent = 'Voice connected';
    voiceConnectedAt = Date.now();
    startVoiceTimer();
  }catch(err){
    console.warn('LiveKit connect failed', err);
    toast('Could not connect to voice server.','err');
    setConnStatus('bad','Connection failed');
    voiceChannel = null; voiceRoomName = null;
    updateVoiceDock();
    return false;
  }
  refreshVoiceCounts();
  return true;
}

/* ---- call / voice timers ---- */
function startVoiceTimer(){
  stopVoiceTimer();
  voiceTimerInt = setInterval(tickVoiceTimer, 1000);
  tickVoiceTimer();
}
function stopVoiceTimer(){
  if(voiceTimerInt){ clearInterval(voiceTimerInt); voiceTimerInt = null; }
  $('vd-timer').textContent = '';
  $('mh-timer').classList.add('hidden');
}
function tickVoiceTimer(){
  if(!voiceChannel || !voiceConnectedAt){ stopVoiceTimer(); return; }
  const base = (voiceChannel.type==='dm' && call && call.connectedAt) ? call.connectedAt : voiceConnectedAt;
  const t = fmtElapsed(Date.now() - base);
  $('vd-timer').textContent = t;
  updateHeaderTimer(t);
}
function updateHeaderTimer(t){
  const show = !!(voiceChannel && voiceConnectedAt && activeChannel && activeChannel.id === voiceChannel.id && activeChannel.type === voiceChannel.type);
  $('mh-timer').classList.toggle('hidden', !show);
  if(show) $('mh-timer').textContent = t || fmtElapsed(Date.now() - voiceConnectedAt);
}

function localTeardown(){
  disconnectLiveKit();
  stopScreenShare(true);
  $('tile-grid').innerHTML = '';
  $('screen-theater').innerHTML = '';
  $('screen-theater').classList.remove('show');
  $('remote-audio').innerHTML = '';
  Object.keys(remoteAudioEls).forEach(k=>delete remoteAudioEls[k]);
  Object.keys(remoteScreens).forEach(k=>delete remoteScreens[k]);
}

function leaveVoice(silent){
  if(!voiceChannel) return;
  const wasDm = voiceChannel.type === 'dm';
  if(wasDm && call){ finishDmCall(false, true); return; }
  const wasViewing = activeChannel && activeChannel.id === voiceChannel.id && !wasDm;
  localTeardown();
  voiceChannel = null; voiceRoomName = null;
  voiceConnectedAt = 0; stopVoiceTimer();
  musicState = null; renderMusicBar();
  updateVoiceDock();
  refreshVoiceCounts();
  setConnStatus('bad','Not connected');
  if(!silent) sfx.leave();
  if(wasViewing && currentChatChannel) openChannel(currentChatChannel);
  renderMembers();
}
$('tb-leave').addEventListener('click', ()=>leaveVoice(false));
$('vd-leave').addEventListener('click', ()=>leaveVoice(false));

function updateVoiceDock(){
  $('voice-dock').classList.toggle('show', !!voiceChannel);
  if(voiceChannel) $('vd-channel').textContent = voiceChannel.type==='dm' ? ('Call \u2014 ' + voiceChannel.name) : voiceChannel.name;
}

function disconnectLiveKit(){
  if(!livekitRoom) return;
  try{ livekitRoom.disconnect(); }catch{}
  livekitRoom = null;
}

/* ============================================================
   LiveKit event handlers
   ============================================================ */
function setupLiveKitEvents(){
  if(!livekitRoom) return;

  livekitRoom.on(RoomEvent.ParticipantConnected, (participant)=>{
    ensureTileForParticipant(participant);
    sfx.peerJoin();
    refreshVoiceCounts();
    if(voiceChannel && voiceChannel.type==='dm' && call && call.state!=='active' && participant.identity!=='music-bot'){
      call.state = 'active';
      call.connectedAt = Date.now();
      stopRingLoop();
      updateCallUi();
    }
  });

  livekitRoom.on(RoomEvent.ParticipantDisconnected, (participant)=>{
    const id = participant.identity;
    const tile = document.querySelector(`.vtile[data-id="${CSS.escape(id)}"]`);
    if(tile) tile.remove();
    const audioEl = remoteAudioEls[id];
    if(audioEl){ audioEl.srcObject = null; audioEl.remove(); delete remoteAudioEls[id]; }
    removeRemoteScreen(id);
    sfx.peerLeave();
    refreshVoiceCounts();
    // DM call: when the other person hangs up, end our side and log the duration
    if(voiceChannel && voiceChannel.type==='dm' && call && participant.identity!=='music-bot'){
      const humansLeft = [...livekitRoom.remoteParticipants.values()].filter(p=>p.identity!=='music-bot').length;
      if(humansLeft === 0) finishDmCall(false, false);
    }
  });

  livekitRoom.on(RoomEvent.TrackSubscribed, (track, publication, participant)=>{
    if(track.kind === 'audio'){
      const audioEl = document.createElement('audio');
      audioEl.autoplay = true;
      audioEl.srcObject = new MediaStream([track.mediaStreamTrack]);
      audioEl.muted = isDeafened;
      $('remote-audio').appendChild(audioEl);
      remoteAudioEls[participant.identity] = audioEl;
      applySink(audioEl);
      audioEl.play().catch(()=>{});
    }else if(track.kind === 'video'){
      // Screen share video
      const existing = document.querySelector(`.screen-box[data-identity="${CSS.escape(participant.identity)}"]`);
      let box;
      if(!existing){
        box = buildScreenBox(participant.identity, `${participant.name || participant.identity}'s screen`, false);
        box.dataset.identity = participant.identity;
      }else{
        box = existing;
      }
      const v = box.querySelector('video');
      v.srcObject = new MediaStream([track.mediaStreamTrack]);
      remoteScreens[participant.identity] = v;
      const tile = tileFor(participant.identity);
      if(tile) tile.classList.add('sharing');
    }
  });

  livekitRoom.on(RoomEvent.TrackUnsubscribed, (track, publication, participant)=>{
    if(track.kind === 'audio'){
      const audioEl = remoteAudioEls[participant.identity];
      if(audioEl){ audioEl.srcObject = null; audioEl.remove(); delete remoteAudioEls[participant.identity]; }
    }else if(track.kind === 'video'){
      removeRemoteScreen(participant.identity);
    }
  });

  livekitRoom.on(RoomEvent.ActiveSpeakersChanged, (speakers)=>{
    const selfId = livekitRoom.localParticipant.identity;
    setTalking('local', false);
    [...livekitRoom.remoteParticipants.values()].forEach(p=>setTalking(p.identity, false));
    speakers.forEach(sp=>setTalking(sp.identity === selfId ? 'local' : sp.identity, true));
  });

  livekitRoom.on(RoomEvent.DataReceived, (payload, participant)=>{
    if(!participant) return;
    let m;
    try{ m = JSON.parse(new TextDecoder().decode(payload)); }catch{ return; }
    switch(m.t){
      case 'sb-clip': receiveSoundChunk(m); break;
      case 'sb-play': playSoundById(m.id, m.username || participant.name || 'Someone'); break;
    }
  });
}

function ensureTileForParticipant(participant){
  if(tileFor(participant.identity)) return;
  let meta = {};
  try{ meta = JSON.parse(participant.metadata || '{}'); }catch{}
  const user = {
    id: meta.id,
    username: meta.username || participant.name || participant.identity,
    avatar_color: meta.avatar_color || '#58a6ff',
    bot: !!meta.bot || participant.identity === 'music-bot'
  };
  if(user.id && !user.bot) rememberUser(user);
  buildTile(participant.identity, user, false);
}

function refreshLiveKitRoster(){
  if(!livekitRoom) return;
  livekitParticipants = [...livekitRoom.remoteParticipants.values()].map(p=>({
    id: p.identity,
    identity: p.identity,
    name: p.name || p.identity,
    metadata: p.metadata,
    isSpeaking: p.isSpeaking,
    audioLevel: p.audioLevel
  }));
}

/* ============================================================
   DM CALLS — ring, accept/decline, duration logging
   ============================================================ */
function ringTone(incoming){
  blip(incoming ? [660,880] : [523], incoming ? 0.16 : 0.5, 0.12, 'sine', 0.14);
}
function startRingLoop(incoming){
  stopRingLoop();
  ringTone(incoming);
  if(call) call.ringInt = setInterval(()=>ringTone(incoming), incoming ? 2400 : 3000);
}
function stopRingLoop(){
  if(call && call.ringInt){ clearInterval(call.ringInt); call.ringInt = null; }
}

async function startDmCall(d){
  if(call){ toast('You are already in a call.','warn'); return; }
  if(voiceChannel) leaveVoice(true);
  call = { channelId: d.channelId, withUser: d.other, state: 'ringing-out', connectedAt: 0, ringInt: null, timeout: null };
  const ok = await joinVoice({ id: d.channelId, name: d.other.username, type: 'dm', dm: d });
  if(!ok){ call = null; return; }
  socket.emit('call:ring', { channelId: d.channelId });
  startRingLoop(false);
  call.timeout = setTimeout(()=>{
    if(call && call.state === 'ringing-out'){
      toast(`${d.other.username} didn't answer.`,'warn');
      socket.emit('call:cancel', { channelId: d.channelId });
      finishDmCall(true, true);
    }
  }, 60000);
  showVoiceStage();
  updateCallUi();
}

function onIncomingCall({channelId, from}){
  if(!from) return;
  rememberUser(from);
  if(call){ socket.emit('call:decline', { channelId }); return; } // busy
  call = { channelId, withUser: from, state: 'ringing-in', connectedAt: 0, ringInt: null, timeout: null };
  startRingLoop(true);
  const modal = el('div'); modal.id = 'call-modal';
  const card = el('div','call-card');
  const av = makeAvatar(from.username, from.avatar_color, 'avatar');
  card.appendChild(av);
  card.appendChild(el('h3', null, from.username));
  card.appendChild(el('p', null, 'Incoming call'));
  const actions = el('div','call-actions');
  const acc = el('button','call-btn accept'); acc.title='Accept'; acc.appendChild(svgUse('i-phone'));
  const dec = el('button','call-btn decline'); dec.title='Decline'; dec.appendChild(svgUse('i-phone-off'));
  actions.append(acc, dec);
  card.appendChild(actions);
  modal.appendChild(card);
  document.body.appendChild(modal);
  acc.addEventListener('click', ()=>acceptCall());
  dec.addEventListener('click', ()=>{
    socket.emit('call:decline', { channelId });
    endIncomingRing(false);
  });
  call.timeout = setTimeout(()=>endIncomingRing(true), 55000);
}

async function acceptCall(){
  if(!call || call.state !== 'ringing-in') return;
  const c = call;
  stopRingLoop();
  if(c.timeout) clearTimeout(c.timeout);
  const modal = $('call-modal'); if(modal) modal.remove();
  // make sure the DM exists in our sidebar, then open it
  if(!dms.some(d=>d.channelId === c.channelId)) await loadDms();
  let d = dms.find(x=>x.channelId === c.channelId);
  if(!d) d = { channelId: c.channelId, other: c.withUser };
  socket.emit('chat:join', c.channelId); joinedChatRooms.add(c.channelId);
  openDm(d);
  const ok = await joinVoice({ id: c.channelId, name: c.withUser.username, type: 'dm', dm: d });
  if(!ok){ call = null; return; }
  socket.emit('call:accept', { channelId: c.channelId });
  call.state = 'active';
  call.connectedAt = Date.now();
  showVoiceStage();
  updateCallUi();
}

function endIncomingRing(timedOut){
  const modal = $('call-modal'); if(modal) modal.remove();
  stopRingLoop();
  if(call && call.timeout) clearTimeout(call.timeout);
  if(call) toast(`Missed call from ${call.withUser.username}.`,'warn');
  call = null;
}

function updateCallUi(){
  if(!call) return;
  if(call.state === 'ringing-out'){
    $('vd-status').textContent = 'Calling…';
    setConnStatus('warn', `Calling ${call.withUser.username}…`);
  }else if(call.state === 'active'){
    $('vd-status').textContent = 'Voice connected';
    setConnStatus('ok', `In a call with ${call.withUser.username}`);
  }
  renderMembers();
}

/* end a DM call and (from exactly one side) log its duration in the chat */
function finishDmCall(missed, iEnded){
  if(!call) return;
  const c = call;
  stopRingLoop();
  if(c.timeout) clearTimeout(c.timeout);
  const modal = $('call-modal'); if(modal) modal.remove();

  let shouldPost = false, secs = 0;
  if(missed){
    shouldPost = iEnded && c.state === 'ringing-out'; // caller logs the missed call
  }else if(c.connectedAt){
    secs = Math.max(1, Math.round((Date.now() - c.connectedAt) / 1000));
    const humansLeft = livekitRoom ? [...livekitRoom.remoteParticipants.values()].filter(p=>p.identity!=='music-bot').length : 0;
    shouldPost = humansLeft === 0; // whoever is last in the room posts, so it's logged once
  }
  if(iEnded && c.state === 'ringing-out' && !missed){
    socket.emit('call:cancel', { channelId: c.channelId });
    shouldPost = true; // cancelled before pickup -> missed call
  }

  call = null;
  localTeardown();
  voiceChannel = null; voiceRoomName = null;
  voiceConnectedAt = 0; stopVoiceTimer();
  musicState = null; renderMusicBar();
  updateVoiceDock();
  refreshVoiceCounts();
  setConnStatus('bad','Not connected');
  sfx.leave();

  if(shouldPost){
    api(`/api/channels/${c.channelId}/messages`, { method:'POST', body: JSON.stringify({ content: `[[call:${secs}]]` }) }).catch(()=>{});
  }
  if(activeChannel && activeChannel.type==='dm' && activeChannel.id===c.channelId) showChatStage();
  renderMembers();
}

/* ============================================================
   VOICE â€” tiles
   ============================================================ */
function tileFor(id){ return document.querySelector(`.vtile[data-id="${CSS.escape(id)}"]`); }

function makeAvatar(username, color, cls){
  const a = el('div', cls || 'avatar');
  const prof = profiles[username];
  if(prof && prof.avatar){
    a.style.backgroundImage = `url("${prof.avatar}")`;
    a.style.backgroundColor = color || '#58a6ff';
  }else{
    a.style.background = color || '#58a6ff';
    a.textContent = getInitials(username);
  }
  return a;
}

function addSelfTile(){
  if(tileFor('local')) return;
  buildTile('local', currentUser, true);
}
function ensureTile(id, user){
  if(tileFor(id)) return;
  buildTile(id, user, false);
  refreshVoiceCounts();
}
function buildTile(id, user, isSelf){
  const tile = el('div','vtile'+(user.bot?' bot':''));
  tile.dataset.id = id;
  tile.dataset.username = user.username;
  const uid = isSelf ? currentUser.id : user.id;
  if(uid) tile.dataset.uid = uid;
  const wrap = el('div','av-wrap');
  wrap.append(el('div','ring ring1'), el('div','ring ring2'), el('div','ring ring3'));
  const av = makeAvatar(user.username, user.avatar_color, 'avatar');
  av.style.width = '72px'; av.style.height = '72px'; av.style.fontSize = '24px';
  if(user.bot){ av.textContent=''; av.appendChild(svgUse('i-music')); av.querySelector('svg').style.cssText='width:30px;height:30px'; }
  wrap.appendChild(av);
  tile.appendChild(wrap);
  const nameEl = el('div','vt-name', user.username);
  applyNameStyle(nameEl, user.username);
  nameEl.addEventListener('click', (e)=>{ e.stopPropagation(); openProfilePopout(e.currentTarget, user.username, user.avatar_color, uid); });
  if(!user.bot) bindUserCtx(tile, { id: uid, username: user.username, avatar_color: user.avatar_color });
  tile.appendChild(nameEl);
  const badges = el('div','vt-badges');
  const bm = el('span','badge b-mute'); bm.appendChild(svgUse('i-mic-off')); bm.appendChild(document.createTextNode('MUTED'));
  const bd = el('span','badge b-deaf'); bd.appendChild(svgUse('i-headphones-off')); bd.appendChild(document.createTextNode('DEAF'));
  const bl = el('span','badge b-live', 'LIVE');
  badges.append(bm, bd, bl);
  if(isSelf) badges.appendChild(el('span','badge b-you','YOU'));
  tile.appendChild(badges);
  $('tile-grid').appendChild(tile);
}

function refreshVoiceCounts(){
  const n = voiceChannel ? document.querySelectorAll('.vtile').length : 0;
  if(activeChannel && voiceChannel && activeChannel.id === voiceChannel.id){
    $('mh-sub').textContent = `Voice channel Â· ${n} connected`;
  }
  document.querySelectorAll('.channel-item[data-type="voice"]').forEach(item=>{
    const live = item.querySelector('.ch-live');
    if(live) live.classList.toggle('hidden', !(voiceChannel && voiceChannel.type!=='dm' && String(voiceChannel.id)===item.dataset.id && n>0));
  });
  refreshSidebarVoiceMembers();
  renderMembers();
  updateConnStatus();
}

function refreshSidebarVoiceMembers(){
  document.querySelectorAll('.vc-members').forEach(box=>{
    box.innerHTML = '';
    if(!voiceChannel || voiceChannel.type==='dm' || box.dataset.for !== String(voiceChannel.id)) return;
    const members = livekitRoom ? [...livekitRoom.remoteParticipants.values()] : [];
    if(!livekitRoom || !livekitRoom.localParticipant) return;
    const allParticipants = [livekitRoom.localParticipant, ...members];
    allParticipants.forEach(p=>{
      const identity = p.identity;
      const name = p.name || identity;
      let meta = {};
      try{ meta = JSON.parse(p.metadata || '{}'); }catch{}
      const isSelf = identity === livekitRoom.localParticipant.identity;
      const remoteMuted = p.attributes && (p.attributes.muted === 'true' || p.attributes.deafened === 'true');
      const muted = isSelf ? (isMuted || isDeafened || (pttMode && !pttHeld)) : remoteMuted;
      const row = el('div','vc-member');
      row.dataset.peer = isSelf ? 'local' : identity;
      const mini = makeAvatar(name, meta.avatar_color || '#58a6ff', 'mini-av');
      row.appendChild(mini);
      row.appendChild(el('span', null, name));
      if(muted){ const m = el('span','m-mute'); m.appendChild(svgUse('i-mic-off')); row.appendChild(m); }
      box.appendChild(row);
    });
  });
}

/* ============================================================
   VOICE â€” LiveKit connection status
   ============================================================ */
function updateConnStatus(){
  if(!voiceChannel){ setConnStatus('bad','Not connected'); $('vd-status').textContent='Voice'; return; }
  if(!livekitRoom || livekitRoom.state === 'disconnected'){
    setConnStatus('bad','Disconnected');
  }else if(livekitRoom.state === 'connecting'){
    setConnStatus('warn','Connectingâ€¦');
  }else{
    const count = livekitRoom.remoteParticipants.size;
    if(count === 0){
      setConnStatus('ok', 'Connected â€” you are the only one here');
    }else{
      setConnStatus('ok', `Connected Â· ${count} other${count!==1?'s':''}`);
    }
    $('vd-status').textContent = 'Voice connected';
  }
  $('vd-signal').classList.toggle('warn', $('conn-ind').classList.contains('warn'));
  $('vd-signal').classList.toggle('bad', $('conn-ind').classList.contains('bad'));
}
function setConnStatus(kind, text){
  $('conn-ind').className = kind==='ok' ? '' : kind;
  $('conn-text').textContent = text;
}

/* ============================================================
   VOICE â€” talking (triggered by LiveKit ActiveSpeakersChanged)
   ============================================================ */
function setTalking(id, talking){
  const tile = tileFor(id);
  if(tile) tile.classList.toggle('talking', talking);
  const row = document.querySelector(`.vc-member[data-peer="${CSS.escape(id)}"]`);
  if(row) row.classList.toggle('speaking', talking);

/* ============================================================

   ============================================================ */
async function refreshDevices(){
  let devices = [];
  try{ devices = await navigator.mediaDevices.enumerateDevices(); }catch{ return; }
  const mics = devices.filter(d=>d.kind==='audioinput');
  const outs = devices.filter(d=>d.kind==='audiooutput');
  const fill = (select, list, label, selectedId)=>{
    select.innerHTML = '';
    if(!list.length){
      const o = el('option', null, `No ${label} found`); o.value=''; select.appendChild(o); return;
    }
    list.forEach((d,i)=>{
      const o = el('option', null, d.label || `${label} ${i+1}`);
      o.value = d.deviceId;
      if(selectedId && d.deviceId===selectedId) o.selected = true;
      select.appendChild(o);
    });
  };
  const activeMic = micStream?.getAudioTracks()[0]?.getSettings().deviceId || settings.micId;
  fill($('mic-select'), mics, 'Microphone', activeMic);
  fill($('speaker-select'), outs, 'Output', settings.spkId);
  const sMic = $('s-mic'), sSpk = $('s-speaker');
  if(sMic) fill(sMic, mics, 'Microphone', activeMic);
  if(sSpk) fill(sSpk, outs, 'Output', settings.spkId);
  if(!('setSinkId' in HTMLMediaElement.prototype)){
    $('speaker-select').disabled = true;
    $('speaker-select').title = 'Output selection is not supported by this browser';
  }
}
navigator.mediaDevices.addEventListener('devicechange', ()=>refreshDevices());

function onMicChosen(id){ settings.micId = id; store.set('settings', settings); if(micStream) swapMic(); refreshDevices(); }
function onSpeakerChosen(id){

  refreshDevices();
}
$('mic-select').addEventListener('change', e=>onMicChosen(e.target.value));
$('speaker-select').addEventListener('change', e=>onSpeakerChosen(e.target.value));
function applySink(a){

}

   ============================================================ */
$('tb-share').addEventListener('click', ()=>{ screenTrack ? stopScreenShare() : startScreenShare(); });

async function startScreenShare(){
  if(!voiceChannel){ toast('Join a voice channel first.','warn'); return; }
  if(!livekitRoom){ toast('Not connected to voice.','err'); return; }
  try{
    screenStream = await navigator.mediaDevices.getDisplayMedia({
      video: { width:{ideal:1920}, height:{ideal:1080}, frameRate:{ideal:30, max:60} },
      audio: settings.shareAudio
    });
  }catch{ return; }
  screenTrack = screenStream.getVideoTracks()[0];
  screenAudioTrack = screenStream.getAudioTracks()[0] || null;
  try{ screenTrack.contentHint = 'detail'; }catch{}
  await livekitRoom.localParticipant.publishTrack(screenTrack, { source: 'screen_share' });
  if(screenAudioTrack){
    await livekitRoom.localParticipant.publishTrack(screenAudioTrack, { source: 'screen_share' });
  }
  screenTrack.addEventListener('ended', ()=>stopScreenShare());
  removeRemoteScreen('local');
  const box = buildScreenBox('local', 'Your screen', true);
  box.querySelector('video').srcObject = screenStream;
  const self = tileFor('local'); if(self) self.classList.add('sharing');
  $('tb-share').classList.add('accent-on');
  $('tb-share').querySelector('span').textContent = 'Stop sharing';
}

function stopScreenShare(silent){
  if(!screenTrack) return;
  if(livekitRoom){
    screenStream.getVideoTracks().forEach(t=>{
      const pub = livekitRoom.localParticipant.getTrackPublication(t.label);
      if(pub) livekitRoom.localParticipant.unpublishTrack(t);
    });
    if(screenAudioTrack){
      livekitRoom.localParticipant.unpublishTrack(screenAudioTrack);
    }
  }
  screenStream.getTracks().forEach(t=>t.stop());
  screenStream = null; screenTrack = null; screenAudioTrack = null;
  removeRemoteScreen('local');
  const self = tileFor('local'); if(self) self.classList.remove('sharing');
  $('tb-share').classList.remove('accent-on');
  $('tb-share').querySelector('span').textContent = 'Share screen';
}

function buildScreenBox(peerId, label, isLocal){
  const theater = $('screen-theater');
  const box = el('div','screen-box'); box.dataset.peer = peerId;
  const v = document.createElement('video');
  v.autoplay = true; v.playsInline = true; if(isLocal) v.muted = true;
  box.appendChild(v);
  const lb = el('div','sb-label'); lb.appendChild(svgUse('i-screen')); lb.querySelector('svg').style.width='13px';
  lb.appendChild(document.createTextNode(label));
  box.appendChild(lb);
  if(isLocal){
    const stop = el('button','sb-stop','Stop sharing');
    stop.addEventListener('click', ()=>stopScreenShare());
    box.appendChild(stop);
  }
  const ex = el('button','sb-expand'); ex.title='Fullscreen'; ex.appendChild(svgUse('i-expand'));
  ex.addEventListener('click', ()=>{ (v.requestFullscreen||v.webkitRequestFullscreen||function(){}).call(v); });
  box.appendChild(ex);
  theater.appendChild(box);
  theater.classList.add('show');
  return box;
}
function removeRemoteScreen(peerId){
  const box = document.querySelector(`.screen-box[data-peer="${CSS.escape(peerId)}"]`);
  if(box){ const v=box.querySelector('video'); if(v) v.srcObject=null; box.remove(); }
  if(!$('screen-theater').children.length) $('screen-theater').classList.remove('show');
  const tile = tileFor(peerId); if(tile && peerId!=='local') tile.classList.remove('sharing');
}

function broadcastMetaLiveKit(obj){
  if(!livekitRoom || !livekitRoom.localParticipant) return;
  try{ livekitRoom.localParticipant.publishData(JSON.stringify(obj), 1); }catch{}
}
let mySounds = store.get('sounds', []); // [{id,name,dataUrl}]
const SB_CHUNK = 14000, SB_MAX_CHARS = 260000, SB_MAX_MY = 8;

$('tb-soundboard').addEventListener('click', (e)=>{
  e.stopPropagation();
  togglePopover('sb-pop', $('tb-soundboard'), buildSoundboardPopover);

function buildSoundboardPopover(){
  const pop = el('div','popover'); pop.id = 'sb-pop';
  const h = el('h6', null, 'Soundboard'); pop.appendChild(h);
  const grid = el('div'); grid.id = 'sb-grid'; pop.appendChild(grid);
  const all = [...mySounds.map(s=>({...s, by:'you', mine:true})), ...Object.values(remoteSounds)];
  if(!all.length){
    const empty = el('div', null, 'No sounds yet. Add a short clip â€” everyone in this channel will be able to play it.');
    empty.id = 'sb-empty'; grid.appendChild(empty);
  }
  all.forEach(s=>{
    const pad = el('button','sb-pad');
    pad.appendChild(document.createTextNode(s.name));
    pad.appendChild(el('small', null, s.mine ? 'yours' : 'from '+(s.by||'a member')));
    pad.addEventListener('click', ()=>{
      playSoundById(s.id, 'you');
      broadcastMetaLiveKit({ t:'sb-play', id: s.id, username: currentUser.username });
    });
    if(s.mine){
      const del = el('span','sb-del','âœ•'); del.title='Remove';
      del.addEventListener('click', (ev)=>{ ev.stopPropagation(); mySounds = mySounds.filter(x=>x.id!==s.id); store.set('sounds', mySounds); closePopovers(); });
      pad.appendChild(del);
    }
    grid.appendChild(pad);
  });
  const add = el('button','btn'); add.id='sb-add'; add.textContent = 'Upload a sound (â‰¤ ~200 KB, a few seconds)';
  add.addEventListener('click', ()=>$('sound-file').click());
  pop.appendChild(add);
  return pop;
}
$('sound-file').addEventListener('change', async ()=>{
  const f = $('sound-file').files[0];
  $('sound-file').value = '';
  if(!f) return;
  if(mySounds.length >= SB_MAX_MY){ toast(`Soundboard is full (${SB_MAX_MY} sounds). Remove one first.`,'warn'); return; }
  const dataUrl = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(f); }).catch(()=>null);
  if(!dataUrl || dataUrl.length > SB_MAX_CHARS){ toast('That clip is too large. Use a short clip under ~200 KB.','err'); return; }
  const sound = { id: 'sb_'+Date.now()+'_'+Math.random().toString(36).slice(2,7), name: f.name.replace(/\.[^.]+$/,'').slice(0,24) || 'Sound', dataUrl };
  mySounds.push(sound);
  store.set('sounds', mySounds);
  broadcastSoundClip(sound);
  toast(`"${sound.name}" added and shared with the channel.`);
  closePopovers();
});
function broadcastSoundClip(sound){
  const total = Math.ceil(sound.dataUrl.length / SB_CHUNK);
  for(let i=0; i<total; i++){
    broadcastMetaLiveKit({ t:'sb-clip', id: sound.id, name: sound.name, by: currentUser.username, seq: i, total, data: sound.dataUrl.slice(i*SB_CHUNK, (i+1)*SB_CHUNK) });
  }
}
function receiveSoundChunk(m){
  if(remoteSounds[m.id] || mySounds.some(s=>s.id===m.id)) return;
  let entry = sbIncoming[m.id];
  if(!entry) entry = sbIncoming[m.id] = { chunks: new Array(m.total), got: 0, name: m.name, by: m.by };
  if(entry.chunks[m.seq] == null){ entry.chunks[m.seq] = m.data; entry.got++; }
  if(entry.got === m.total){
    const dataUrl = entry.chunks.join('');
    if(dataUrl.length <= SB_MAX_CHARS && dataUrl.startsWith('data:audio')){
      remoteSounds[m.id] = { id: m.id, name: entry.name, by: entry.by, dataUrl };
    }
    delete sbIncoming[m.id];
  }
}
const decodedSounds = {};
async function playSoundById(id, by){
  const s = mySounds.find(x=>x.id===id) || remoteSounds[id];
  if(!s || isDeafened) return;
  try{
    const ctx = ensureCtx();
    if(!decodedSounds[id]){
      const bin = atob(s.dataUrl.split(',')[1]);
      const buf = new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) buf[i] = bin.charCodeAt(i);
      decodedSounds[id] = await ctx.decodeAudioData(buf.buffer);
    }
    const src = ctx.createBufferSource();
    src.buffer = decodedSounds[id];
    src.connect(sfxGain || ctx.destination);
    src.start();
  }catch{}
}

const BANNER_RE = /^(#[0-9a-fA-F]{3,8}|linear-gradient\(135deg,#[0-9a-fA-F]{3,8},#[0-9a-fA-F]{3,8}\))$/;
function sanitizeProfile(p){
  const s = {};
  if(!p || typeof p !== 'object') return s;
  if(p.banner && BANNER_RE.test(p.banner)) s.banner = p.banner;
  if(typeof p.bannerImage === 'string' && p.bannerImage.startsWith('data:image/') && p.bannerImage.length <= 400000) s.bannerImage = p.bannerImage;
  if(typeof p.about === 'string') s.about = p.about.slice(0, 300);
  if(p.nameColor && /^#[0-9a-fA-F]{3,8}$/.test(p.nameColor)) s.nameColor = p.nameColor;
  if(['','display','serif','mono','cursive'].includes(p.nameFont||'')) s.nameFont = p.nameFont||'';
  if(typeof p.avatar === 'string' && p.avatar.startsWith('data:image/') && p.avatar.length <= 150000) s.avatar = p.avatar;
  return s;
}

function renderMembers(){
  const list = $('members-list');
  if(!list) return;
  list.innerHTML = '';

  const viewingVoice = voiceChannel && activeChannel && activeChannel.id === voiceChannel.id && activeChannel.type === voiceChannel.type;
  if(viewingVoice && livekitRoom && livekitRoom.localParticipant){
    $('members-title').textContent = voiceChannel.type==='dm' ? 'In call' : 'In voice';
    const all = [livekitRoom.localParticipant, ...livekitRoom.remoteParticipants.values()];
    all.forEach(pp=>{
      let meta = {};
      try{ meta = JSON.parse(pp.metadata || '{}'); }catch{}
      const isSelf = pp.identity === livekitRoom.localParticipant.identity;
      const uname = meta.username || pp.name || pp.identity;
      const uid = isSelf ? currentUser.id : meta.id;
      const isBot = !!meta.bot || pp.identity==='music-bot';
      list.appendChild(memberRow(uname, meta.avatar_color || (isSelf?currentUser.avatar_color:'#58a6ff'), isSelf ? 'you' : (isBot ? 'bot' : ''), uid, true, isBot));
    });

  if(activeChannel && activeChannel.type === 'dm' && activeChannel.dm){
    $('members-title').textContent = 'This conversation';

function renderMusicBar(){
  const bar = $('music-bar');
  if(!bar) return;
  const st = musicState;
  if(!st || !st.current || !voiceRoomName || st.room !== voiceRoomName){
    bar.classList.remove('show');
    return;
  }
  bar.classList.add('show');
  bar.classList.toggle('paused', !!st.paused);
  $('mb-title').textContent = st.current.title || 'Unknown track';
  const extra = st.queue && st.queue.length ? ` ${DASH} ${st.queue.length} queued` : '';
  $('mb-sub').textContent = `by ${st.current.requestedBy || '?'}${extra}${st.paused ? ' (paused)' : ''}`;
  $('mb-pause').innerHTML = '';
  $('mb-pause').appendChild(svgUse(st.paused ? 'i-play' : 'i-pause'));
}
function musicCommand(text){
  if(!voiceRoomName){ toast('Join a voice channel first.','warn'); return; }
  const feedbackId = (currentChatChannel && currentChatChannel.id)
    || (voiceChannel && voiceChannel.type==='dm' && voiceChannel.id)
    || (channels.find(c=>c.type==='text')||{}).id;
  if(!feedbackId){ toast('Open a text channel so the bot can reply.','warn'); return; }
  api('/api/music/command', { method:'POST', body: JSON.stringify({ room: voiceRoomName, channelId: feedbackId, text }) }).catch(()=>{});
}

/* like compressImage but wide-crop friendly for banners */
function compressBanner(file, maxChars){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    img.onload = ()=>{
      let quality = 0.82, maxW = 1000;
      const attempt = ()=>{
        const scale = Math.min(1, maxW/img.width);
        const c = document.createElement('canvas');
        c.width = Math.max(1, Math.round(img.width*scale));
        c.height = Math.max(1, Math.round(img.height*scale));
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        const out = c.toDataURL('image/jpeg', quality);
        if(out.length <= maxChars || (quality<=0.4 && maxW<=400)) return out;
        if(quality > 0.4) quality -= 0.14; else maxW = Math.round(maxW*0.75);
        return attempt();
      };
      try{ resolve(attempt()); }catch(e){ reject(e); }
      URL.revokeObjectURL(img.src);
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

   Quick switcher (Ctrl+K)
   ============================================================ */
let qsOverlay = null, qsSel = 0;
$('qs-hint-btn').addEventListener('click', openQuickSwitcher);
function openQuickSwitcher(){
  if(qsOverlay){ closeQuickSwitcher(); return; }
  const ov = el('div','overlay'); ov.style.alignItems = 'flex-start';
  const modal = el('div','modal'); modal.id = 'qs-modal';
  const input = el('input'); input.id = 'qs-input'; input.placeholder = 'Jump to a channelâ€¦';
  const results = el('div'); results.id = 'qs-results';
  const hint = el('div','qs-hint');
  hint.innerHTML = '<span>â†‘â†“ navigate</span><span>Enter open</span><span>Esc close</span>';
  modal.append(input, results, hint);
  ov.appendChild(modal);
  document.body.appendChild(ov);
  qsOverlay = ov; qsSel = 0;
  ov.addEventListener('click', (e)=>{ if(e.target===ov) closeQuickSwitcher(); });

  const render = ()=>{
    const q = input.value.trim().toLowerCase();
    const entries = [
      ...channels.map(c=>({ kind:'channel', name:c.name, type:c.type, ref:c })),
      ...dms.map(d=>({ kind:'dm', name:d.other.username, type:'dm', ref:d }))
    ];
    const list = entries.filter(c=>!q || c.name.toLowerCase().includes(q));
    qsSel = clamp(qsSel, 0, Math.max(0, list.length-1));
    results.innerHTML = '';
    list.forEach((c,i)=>{
      const item = el('div','qs-item'+(i===qsSel?' sel':''));
      const ic = el('span','ch-icon'); ic.appendChild(svgUse(c.type==='voice'?'i-speaker':c.type==='dm'?'i-message':'i-hash'));
      item.append(ic, el('span', null, c.name));
      if(c.kind==='dm') item.appendChild(el('span','mr-sub','DM'));
      item.addEventListener('click', ()=>{ closeQuickSwitcher(); c.kind==='dm' ? openDm(c.ref) : openChannel(c.ref); });
      item.addEventListener('mousemove', ()=>{ qsSel=i; render(); });
      results.appendChild(item);
    });
    results._list = list;
  };
  input.addEventListener('input', ()=>{ qsSel=0; render(); });
  input.addEventListener('keydown', (e)=>{
    const list = results._list || [];
    if(e.key==='ArrowDown'){ e.preventDefault(); qsSel=clamp(qsSel+1,0,list.length-1); render(); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); qsSel=clamp(qsSel-1,0,list.length-1); render(); }
    else if(e.key==='Enter'){ e.preventDefault(); const c=list[qsSel]; if(c){ closeQuickSwitcher(); c.kind==='dm' ? openDm(c.ref) : openChannel(c.ref); } }
  });
  render();
  setTimeout(()=>input.focus(), 20);
}
function closeQuickSwitcher(){ if(qsOverlay){ qsOverlay.remove(); qsOverlay=null; } }

/* ============================================================
   Global keybinds
   ============================================================ */
document.addEventListener('keydown', (e)=>{
  if((e.ctrlKey||e.metaKey) && !e.shiftKey && e.key.toLowerCase()==='k'){ e.preventDefault(); openQuickSwitcher(); return; }
  if((e.ctrlKey||e.metaKey) && e.shiftKey && e.key.toLowerCase()==='m'){ e.preventDefault(); toggleMute(); return; }
  if((e.ctrlKey||e.metaKey) && e.shiftKey && e.key.toLowerCase()==='d'){ e.preventDefault(); toggleDeafen(); return; }
  if(e.key==='Escape'){
    closeQuickSwitcher(); closeSettings(); closePopovers(); closeProfilePopout(); closeStatusMenu(); closeCtxMenu();
    ['dm-search-ov','server-ov','chan-ov'].forEach(closeOverlayById);
    const lb = $('lightbox'); if(lb) lb.remove();
  }
});

/* keep AudioContext alive after the first user gesture (autoplay policy) */
document.addEventListener('pointerdown', ()=>{ if(audioCtx && audioCtx.state==='suspended') audioCtx.resume().catch(()=>{}); }, { passive:true });

/* ============================================================
   START
   ============================================================ */
(async ()=>{
  if(await checkExistingSession()){
    enterApp();
  }
  // otherwise the auth screen stays visible
})();
</script>
</body>
